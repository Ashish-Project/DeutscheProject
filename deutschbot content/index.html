/**
 * Generate AI lesson for one card.
 * @param {Array}   items      - The news items array
 * @param {number}  idx        - Card index
 * @param {string}  mode       - 'news' or 'tech'
 * @param {boolean} background - If true, runs silently (no UI update if card not visible)
 *
 * TOKEN OPTIMISATION:
 * - Input prompt: ~350 tokens (stripped to essentials)
 * - Output cap: 900 tokens (enough for 5-line summary + vocab + grammar + sentences + questions)
 * - Only called once per card per level per session (cached via _lessonDone flag)
 * - Background calls staggered 900ms apart to avoid rate limits
 *
 * VOCABULARY REPETITION STRATEGY:
 * The prompt instructs the AI to reuse vocabulary from recent articles
 * (stored in window._recentVocab) while introducing 1-2 new words each time.
 */
async function generateCardLesson(items, idx, mode, background) {
  const pKey     = MODES[mode]?.apiProvider || 'gemini';
  const provider = API_PROVIDERS[pKey];
  const key      = S.keys[pKey];

  // No key — show prompt in lesson block so user knows what to do
  if (!key) {
    if (!background) showLessonError(idx, '🔑 Add an API key in ⚙ Settings to generate German lessons.');
    return;
  }

  const item = items[idx];
  if (!item || item._lessonDone) return;
  item._lessonDone = true;

  const lv = S.lv, L = LEVELS[lv];

  if (!window._recentVocab) window._recentVocab = [];
  const recentVocabHint = window._recentVocab.length
    ? `Reuse these recent vocab words where natural, add 1-2 new: ${window._recentVocab.slice(-8).join(', ')}.`
    : 'Introduce 4 new vocabulary words.';

  const langNote = {
    A1: 'STRICT A1 RULES: Write ONLY in Präsens (present tense). Max 8 words per sentence. Every single German sentence MUST have its English translation in [square brackets] immediately after on the SAME line. No exceptions.',
    A2: 'STRICT A2 RULES: Write every sentence in German. Every single German sentence MUST have its English translation in [square brackets] immediately after on the SAME line. Use Präsens and Perfekt tenses. No sentence without English translation.',
    B1: 'STRICT B1 RULES: Write in German (B1 level). After every German sentence, add its English translation in [square brackets] on the same line. Use varied tenses including Perfekt and Konjunktiv II.',
    B2: 'STRICT B2 RULES: Write in German (B2 level). After every German sentence, add its English translation in [square brackets] on the same line. Use complex sentence structures, Konjunktiv II, and passive voice.',
    C1: 'Write in elevated academic German (C1). Add [English] only for technical or academic terms. No translation needed for every sentence.',
    C2: 'Write in native-level German (C2). No English translations.',
  }[lv];

  // CEFR-appropriate grammar coverage
  const grammarDepth = {
    A1: 'Focus on: nouns with articles (der/die/das) and plurals, basic verb conjugation (ich/du/er forms of sein/haben/regular verbs), negation with nicht/kein.',
    A2: 'Cover: nouns with article+plural+accusative, Perfekt tense (haben/sein + past participle), modal verbs (können/müssen/wollen), adjective basics.',
    B1: 'Cover: all noun cases (Nominativ/Akkusativ/Dativ), verb conjugation in present+Perfekt+Präteritum, Konjunktiv II basics, adjective declension.',
    B2: 'Cover: full declension tables, Konjunktiv II and würde-construction, Passiv, complex subordinate clauses, adjective comparison.',
    C1: 'Cover: Konjunktiv I (reported speech), complex Passiv forms, extended adjective constructions, subtle case usage, register differences.',
    C2: 'Cover: all nuanced forms, archaic/literary usage, stylistic register, dialectal variation notes.',
  }[lv];

  // Number of summary sentences scales with level
  const summarySentences = {A1:4, A2:5, B1:6, B2:7, C1:8, C2:9}[lv] || 6;

  const prompt =
`You are DeutschBot, a German tutor at ${lv} level (${L.name}/${L.en}).

ARTICLE:
HEADLINE: "${item.title}"
TEXT: "${(item.desc||'').substring(0,700)}"
SOURCE: ${item.source} (${item.lang})

VOCAB REPETITION: ${recentVocabHint}
GRAMMAR FOCUS: ${grammarDepth}

MANDATORY FORMAT RULE: Every German sentence MUST be immediately followed by its English translation in [square brackets] on the SAME line. Example format: "Die Regierung beschloss neue Maßnahmen. [The government decided on new measures.]"
This applies to EVERY section — no exceptions.

Write EXACTLY these 6 sections (each header on its own line):

[HEADLINE_EN]
Natural English translation of the headline (one line).

[SUMMARY]
Write EXACTLY ${summarySentences} German sentences about this article as a coherent paragraph.
Cover: what happened, who is involved, where and when, background context, and significance.
After EACH German sentence on the SAME line write its English translation: "German text. [English translation.]"
Each sentence should be ${lv==='A1'?'very short (5-8 words)':lv==='A2'?'short (8-12 words)':lv==='B1'?'medium length (12-18 words)':'full length with subordinate clauses'}.

[VOCABULARY]
List 6-8 key words from your summary. For EACH on its own line:
• NOUN | *der/die/das Word* | Plural: die ___ | English | example sentence [English]
• VERB | *infinitive* | ich ___ / du ___ / er ___ | English | example [English]
• ADJ  | *word* | Komparativ: ___ / Superlativ: am ___sten | English | example [English]

[GRAMMAR]
Pick 3 grammar rules visible in your summary above. For EACH write all 4 lines in order:
RULE: [grammar rule name — be specific, e.g. "Perfekt with sein: fahren → ist gefahren"]
EXAMPLE: [exact sentence from your summary that uses this rule]
EXPLANATION: [explain in ${lv==='A1'||lv==='A2'?'simple English':'German'} in 1-2 sentences]
PRACTICE: [new German example sentence using same rule] [English translation]
---

[SENTENCES]
${Math.max(S.linesPerArticle, summarySentences-2)} numbered German sentences on this topic. Each line: "1. German sentence. [English]"

[QUESTIONS]
Q1: [German factual question about the article] [English]
Q2: [German comprehension question] [English]
Q3: [German opinion/discussion question] [English]`;

  // Build request body correctly for each provider
  // Gemini: uses 'contents' + 'generationConfig' at top level
  // OpenAI/Groq/OpenRouter: uses 'messages' + 'max_tokens' at top level
  const contents = [{role:'user', parts:[{text: prompt}]}];
  let reqBody;
  if (pKey === 'gemini') {
    reqBody = {
      contents,
      generationConfig: { temperature: 0.75, maxOutputTokens: 1400, topP: 0.92 },
      safetySettings: [
        {category:'HARM_CATEGORY_HARASSMENT',       threshold:'BLOCK_NONE'},
        {category:'HARM_CATEGORY_HATE_SPEECH',       threshold:'BLOCK_NONE'},
        {category:'HARM_CATEGORY_SEXUALLY_EXPLICIT', threshold:'BLOCK_MEDIUM_AND_ABOVE'},
        {category:'HARM_CATEGORY_DANGEROUS_CONTENT', threshold:'BLOCK_NONE'},
      ],
    };
  } else {
    // OpenAI-compatible providers
    reqBody = {
      model:       provider.model,
      max_tokens:  1000,
      temperature: 0.75,
      messages:    contents.map(c => ({
        role:    c.role === 'model' ? 'assistant' : 'user',
        content: c.parts[0].text,
      })),
    };
  }

  const url  = provider.buildUrl(key, provider.model);
  const hdrs = { 'Content-Type': 'application/json', ...(provider.extraHeaders?.(key) || {}) };

  console.log(`[DeutschBot] Generating lesson for card ${idx} | model: ${provider.model} | url: ${url.split('?')[0]}`);

  try {
    const res  = await fetch(url, {method:'POST', headers:hdrs, body:JSON.stringify(reqBody)});
    console.log(`[DeutschBot] Lesson response status: ${res.status}`);

    // Rate limit — back off and retry once
    if (res.status === 429) {
      item._lessonDone = false;
      if (!background) showLessonError(idx, '⏳ Rate limit hit. Retrying in 12 seconds…');
      await sleep(12000);
      return generateCardLesson(items, idx, mode, background);
    }

    const data = await res.json();
    console.log(`[DeutschBot] Lesson response data:`, JSON.stringify(data).substring(0, 300));

    // Check for API error in response body
    const apiErr = provider.parseError(data);
    if (apiErr) {
      item._lessonDone = false;
      console.warn(`[DeutschBot] API error:`, apiErr);
      const msg = apiErr.code === 401 || apiErr.code === 403
        ? '🔑 API key invalid. Check ⚙ Settings.'
        : `⚠️ API error ${apiErr.code}: ${apiErr.msg}`;
      showLessonError(idx, msg);
      return;
    }

    const text = provider.parseReply(data);
    console.log(`[DeutschBot] Lesson text received (first 200 chars):`, (text||'').substring(0,200));
    if (!text) {
      item._lessonDone = false;
      showLessonError(idx, '⚠️ Empty response from AI. Click Retry below.');
      return;
    }

    // Success — render lesson and track vocab
    renderCardLesson(idx, text, items);
    const vocabMatch = [...text.matchAll(/•\s*\*([^*]+)\*/g)];
    vocabMatch.forEach(m => {
      const w = m[1].replace(/^(der|die|das)\s+/i,'').trim().split(/[\s(]/)[0];
      if (w && !window._recentVocab.includes(w)) window._recentVocab.push(w);
    });
    if (window._recentVocab.length > 20) window._recentVocab = window._recentVocab.slice(-20);

  } catch(e) {
    item._lessonDone = false;
    console.error('[DeutschBot] Lesson fetch exception:', e.message, e);
    showLessonError(idx, `⚠️ ${e.message} — click Retry`);
  }
}

/** Save or remove vocab using global _vocabData lookup (avoids HTML escaping issues) */
function toggleSaveVocabByKey(btn) {
  const vkey = btn.dataset.vkey;
  const data = window._vocabData?.[vkey];
  if (!data) { showToast('⚠️ Word data not found'); return; }
  let vocab = loadVocab();
  const idx = vocab.findIndex(v => v.word === data.word);
  if (idx >= 0) {
    vocab.splice(idx, 1);
    btn.textContent = '☆'; btn.classList.remove('saved');
    btn.title = 'Save to My Vocabulary';
    showToast(`Removed "${data.word}" from vocabulary`);
    saveVocabList(vocab);
  } else {
    vocab.unshift({ ...data, added: new Date().toISOString() });
    if (vocab.length > 500) vocab = vocab.slice(0, 500);
    btn.textContent = '★'; btn.classList.add('saved');
    btn.title = 'Saved — click to remove';
    showToast(`⭐ Saved "${data.word}" — loading grammar details…`);
    saveVocabList(vocab);
    // Auto-enrich new word with grammar details in background
    autoEnrichWord(0); // always inserted at index 0 (unshift)
  }
  const badge = document.getElementById('vocabBankCount');
  if (badge) badge.textContent = loadVocab().length;
}

/** Retry lesson generation for a specific card */
function retryLesson(idx) {
  if (!S.newsItems[idx]) return;
  S.newsItems[idx]._lessonDone = false;
  // Restore spinner
  const lessonEl = document.getElementById('lesson-'+idx);
  const sumEl    = document.getElementById('de-'+idx);
  if (lessonEl) lessonEl.innerHTML = `<div class="nc-section-title">📖 German Lesson</div><div style="color:var(--text3);font-size:12.5px;text-align:center;padding:14px;display:flex;flex-direction:column;align-items:center;gap:8px"><div class="spinner"></div>Generating lesson…</div>`;
  if (sumEl) { sumEl.classList.add('loading'); sumEl.textContent = '⏳ Generating German summary…'; }
  generateCardLesson(S.newsItems, idx, S.newsMode, false);
}

function renderCardLesson(idx, text, items) {
  const get = tag => {
    const re = new RegExp(
      '\\*{0,2}\\s*\\[\\s*' + tag + '\\s*\\]\\s*\\*{0,2}([\\s\\S]*?)(?=\\*{0,2}\\s*\\[[A-Z][A-Z\\s_]+\\]|$)',
      'i'
    );
    const m = text.match(re);
    return m ? m[1].trim() : '';
  };

  const headlineEn = get('HEADLINE_EN');
  const summary    = get('SUMMARY');
  const vocab      = get('VOCABULARY');
  const grammar    = get('GRAMMAR');
  const sentences  = get('SENTENCES');
  const questions  = get('QUESTIONS');

  console.log('[DeutschBot] Sections — hl:', headlineEn.length, 'sum:', summary.length,
    'vocab:', vocab.length, 'grammar:', grammar.length);

  // ── English headline ────────────────────────────────────────────────
  if (headlineEn) {
    const el = document.getElementById('en-headline-'+idx);
    if (el) { el.textContent = '🇬🇧 ' + headlineEn.trim(); el.style.display = 'block'; }
    if (items?.[idx]) items[idx]._headlineEn = headlineEn.trim();
  }

  // ── Fallback: if all sections empty, show raw ────────────────────────
  if (!summary && !vocab && !sentences) {
    const lessonEl = document.getElementById('lesson-'+idx);
    const deEl     = document.getElementById('de-text-'+idx);
    if (deEl) deEl.innerHTML = '<em style="color:#5a82a6">Lesson generated — see below.</em>';
    if (lessonEl) lessonEl.innerHTML = '<div class="nc-lesson-title">📖 Lesson</div>'
      + '<div style="white-space:pre-wrap;font-size:13px;color:#2a3f58;line-height:1.8">'
      + escHtml(text) + '</div>';
    if (items?.[idx]) items[idx]._lessonHTML = lessonEl?.innerHTML || '';
    return;
  }

  // ── Side-by-side summary ────────────────────────────────────────────
  // Parse German sentences and their [English] translations
  const deLines = [], enLines = [];
  if (summary) {
    summary.split('\n').filter(l => l.trim()).forEach(line => {
      // Split at [ that comes after text — finds English bracket translation
      const bi = line.search(/\s\[/);
      if (bi > 0) {
        deLines.push(line.substring(0, bi).trim());
        const en = line.substring(bi).replace(/^\s*\[|\]$/g, '').trim();
        enLines.push(en || '');
      } else {
        deLines.push(line.trim());
        enLines.push('');
      }
    });
  }

  const deEl = document.getElementById('de-text-'+idx);
  const enEl = document.getElementById('en-text-'+idx);
  if (deEl && deLines.length) {
    deEl.innerHTML = deLines.map(l =>
      `<span style="display:block;margin-bottom:7px;line-height:1.78">${l}</span>`
    ).join('');
  }
  if (enEl) {
    if (enLines.some(l => l)) {
      enEl.innerHTML = enLines.map(l =>
        `<span style="display:block;margin-bottom:7px;line-height:1.72;font-size:13px;color:var(--text2)">${l || '&nbsp;'}</span>`
      ).join('');
    } else {
      // No inline translations — AI may have put translations in the de text
      // Try extracting [brackets] from deLines
      const extracted = deLines.map(l => {
        const m = l.match(/\[([^\]]+)\]$/);
        return m ? m[1] : '';
      });
      if (extracted.some(l => l)) {
        enEl.innerHTML = extracted.map(l =>
          `<span style="display:block;margin-bottom:7px;line-height:1.72;font-size:13px;color:var(--text2)">${l || '&nbsp;'}</span>`
        ).join('');
        // Clean up deLines to remove brackets
        for (let i = 0; i < deLines.length; i++) {
          deLines[i] = deLines[i].replace(/\s*\[[^\]]+\]$/, '').trim();
        }
        // Re-render deEl with cleaned lines
        if (deEl) deEl.innerHTML = deLines.map(l =>
          `<span style="display:block;margin-bottom:7px;line-height:1.78">${l}</span>`
        ).join('');
      } else {
        enEl.innerHTML = '<em style="color:var(--text3);font-size:12px">English translation unavailable for this article.</em>';
      }
    }
  }

  // Save summary HTML for tab persistence
  const summaryBlock = document.getElementById('de-'+idx);
  if (summaryBlock && items?.[idx]) items[idx]._summaryHTML = summaryBlock.innerHTML;

  // ── Build lesson block ──────────────────────────────────────────────
  const lessonEl = document.getElementById('lesson-'+idx);
  if (!lessonEl) return;

  let html = '<div class="nc-lesson-title">📖 German Language Lesson</div>';
  html += '<div class="nc-lesson-grid">';

  // ── Vocabulary block ────────────────────────────────────────────────
  html += '<div class="nc-lesson-block">';
  html += '<div class="nc-lesson-block-title vocab-title">🔤 Vocabulary</div>';
  html += '<div class="vocab-list">';

  if (vocab) {
    const savedWords = getSavedVocabWords();
    vocab.split('\n').filter(l => l.trim()).forEach(line => {
      // New format: TYPE | *Word* | forms | English | example
      const clean = line.replace(/^[•\-\*\d]+[.)]\s*/,'').trim();
      if (!clean || clean.length < 3) return;

      let wordType = '', wordDisplay = '', forms = '', meaning = '', example = '';

      const pipeParts = clean.split('|').map(p => p.trim());
      if (pipeParts.length >= 4) {
        // New pipe-separated format
        wordType    = pipeParts[0].toUpperCase();
        wordDisplay = pipeParts[1] || '';
        forms       = pipeParts[2] || '';
        meaning     = pipeParts[3] || '';
        example     = pipeParts[4] || '';
      } else {
        // Fallback: old • *Word* = meaning — example format
        const eqIdx = clean.indexOf(' = ');
        if (eqIdx > -1) {
          wordDisplay = clean.substring(0, eqIdx).trim();
          const rest  = clean.substring(eqIdx+3).trim();
          const dIdx  = rest.indexOf(' — ');
          meaning     = dIdx > -1 ? rest.substring(0, dIdx).trim() : rest;
          example     = dIdx > -1 ? rest.substring(dIdx+3).trim() : '';
        } else {
          wordDisplay = clean;
        }
      }

      const wordClean = wordDisplay.replace(/\*/g,'').trim();
      if (!wordClean || wordClean.length < 2) return;

      const alreadySaved = savedWords.has(wordClean);
      const vocabKey = `${idx}_${wordClean}`;
      window._vocabData = window._vocabData || {};
      window._vocabData[vocabKey] = {
        word: wordClean, meaning, example,
        source: items?.[idx]?.source || '', level: S.lv,
      };

      html += `<div class="vocab-entry">
        ${wordType ? `<div class="vocab-type">${wordType}</div>` : ''}
        <div class="vocab-word">${escHtml(wordDisplay.replace(/\*/g,''))}</div>
        ${forms   ? `<div class="vocab-forms">${escHtml(forms)}</div>` : ''}
        ${meaning ? `<div class="vocab-meaning">${escHtml(meaning)}</div>` : ''}
        ${example ? `<div class="vocab-example">${escHtml(example)}</div>` : ''}
        <button class="vocab-save-btn ${alreadySaved?'saved':''}"
          data-vkey="${vocabKey}" onclick="toggleSaveVocabByKey(this)"
          title="${alreadySaved?'Saved — click to remove':'Save to My Vocabulary'}">
          ${alreadySaved ? '★' : '☆'}
        </button>
      </div>`;
    });
  } else {
    html += '<div style="font-size:12px;color:#8aabcb;padding:8px">No vocabulary extracted.</div>';
  }

  html += '</div></div>'; // close vocab-list, nc-lesson-block

  // ── Grammar block ────────────────────────────────────────────────────
  html += '<div class="nc-lesson-block">';
  html += '<div class="nc-lesson-block-title grammar-title">📐 Grammar</div>';
  html += '<div class="grammar-list">';

  if (grammar) {
    // Try splitting by RULE: keyword first (structured format)
    let grammarRendered = false;
    const ruleBlocks = grammar.split(/\n(?=RULE\s*:)/i).map(b => b.trim()).filter(b => b && b !== '---');
    if (ruleBlocks.length >= 1 && /RULE\s*:/i.test(ruleBlocks[0])) {
      grammarRendered = true;
      ruleBlocks.forEach(block => {
        if (!block || block === '---') return;
        const lines = block.split('\n').map(l => l.trim()).filter(Boolean);
        const ruleM    = block.match(/RULE\s*:\s*(.+?)(?:\n|$)/i);
        const exM      = block.match(/EXAMPLE\s*:\s*(.+?)(?:\n|$)/i);
        const explM    = block.match(/EXPLANATION\s*:\s*([\s\S]+?)(?=\nPRACTICE:|$)/i);
        const practM   = block.match(/PRACTICE\s*:\s*(.+?)(?:\n|$)/i);
        const rule     = ruleM?.[1]?.trim() || lines[0];
        if (!rule || rule === '---') return;
        const parts = [];
        if (exM?.[1])   parts.push(`<strong>Beispiel:</strong> ${escHtml(exM[1].trim())}`);
        if (explM?.[1]) parts.push(`<strong>Erklärung:</strong> ${escHtml(explM[1].trim().replace(/\n/g,' '))}`);
        if (practM?.[1])parts.push(`<strong>Übung:</strong> ${escHtml(practM[1].trim())}`);
        html += `<div class="grammar-entry">
          <div class="grammar-rule">📌 ${escHtml(rule)}</div>
          ${parts.length ? `<div class="grammar-explanation">${parts.join('<br>')}</div>` : ''}
        </div>`;
      });
    }
    // Fallback: split by blank lines or --- separators
    if (!grammarRendered) {
      const fallbackBlocks = grammar.split(/\n\s*---\s*\n|\n\n+/).filter(b => b.trim());
      fallbackBlocks.forEach(block => {
        const lines = block.split('\n').filter(l => l.trim());
        if (!lines.length || block.trim() === '---') return;
        const rule = lines[0].replace(/^RULE:\s*/i,'').replace(/^\d+\.\s*/,'').trim();
        const rest = lines.slice(1).join(' ')
          .replace(/EXAMPLE:/gi,'<strong>Beispiel:</strong>')
          .replace(/EXPLANATION:/gi,'<strong>Erklärung:</strong>')
          .replace(/PRACTICE:/gi,'<strong>Übung:</strong>')
          .trim();
        if (!rule || rule === '---') return;
        html += `<div class="grammar-entry">
          <div class="grammar-rule">📌 ${escHtml(rule)}</div>
          ${rest ? `<div class="grammar-explanation">${rest}</div>` : ''}
        </div>`;
      });
    }
  } else {
    html += '<div style="font-size:12px;color:var(--text3);padding:8px">Grammar section loading…</div>';
  }

  html += '</div></div>'; // close grammar-list, nc-lesson-block
  html += '</div>';       // close nc-lesson-grid

  // ── Practice sentences ──────────────────────────────────────────────
  if (sentences) {
    html += '<div class="nc-sub-title" style="margin-top:14px">✍️ Practice Sentences</div>';
    html += '<div class="nc-sentences">';
    let n = 0;
    sentences.split('\n').filter(l => l.trim()).forEach(line => {
      const clean = line.replace(/^\d+[.)]\s*/,'').trim();
      if (clean.length > 4) {
        n++;
        html += `<div class="nc-sent">
          <span class="nc-sent-num">${n}</span>
          <span class="nc-sent-text">${escHtml(clean)}</span>
        </div>`;
      }
    });
    html += '</div>';
  }

  // ── Questions ───────────────────────────────────────────────────────
  if (questions) {
    html += '<div class="nc-sub-title" style="margin-top:10px">❓ Questions</div>';
    html += '<div class="nc-questions">';
    questions.split('\n').filter(l => l.trim()).forEach(line => {
      const clean = line.replace(/^Q?\d+[:.)]\s*/i,'').trim();
      if (clean.length > 4) html += `<div class="nc-q">${escHtml(clean)}</div>`;
    });
    html += '</div>';
  }

  lessonEl.innerHTML = html;
  if (items?.[idx]) items[idx]._lessonHTML = html;
}

// Per-card chat — strict level enforcement, clean responses
async function ncSend(idx) {
  const pKey = MODES[S.newsMode]?.apiProvider||'gemini';
  if (!S.keys[pKey]) { showToast('⚠️ Add API key in ⚙ Settings'); return; }
  const input=document.getElementById('ncinput-'+idx);
  const msgs=document.getElementById('ncchat-msgs-'+idx);
  if(!input||!msgs)return;
  const text=input.value.trim(); if(!text)return;
  input.value='';
  const ud=document.createElement('div'); ud.className='nc-msg user'; ud.textContent=text;
  msgs.appendChild(ud); msgs.scrollTop=msgs.scrollHeight;
  if(!S.newsChats[idx])S.newsChats[idx]=[];
  S.newsChats[idx].push({role:'user',parts:[{text}]});
  const item=S.newsItems[idx];
  const sysPrompt=
    `You are a German language tutor. Answer ONLY at ${S.lv} level (${LEVELS[S.lv].en}).\n`+
    `Article: "${item.title}" — ${item.source}.\n`+
    `Language rule: ${langPolicy()}\n`+
    `Rules: Answer directly without preamble. Max 80 words. End with one short question. No meta-commentary.`;
  const sysTurn={role:'user',parts:[{text:sysPrompt}]};
  const sysAck={role:'model',parts:[{text:'Verstanden.'}]};
  const contents=[sysTurn,sysAck,...S.newsChats[idx].slice(-6)];
  const td=document.createElement('div'); td.className='nc-msg bot'; td.textContent='…';
  msgs.appendChild(td); msgs.scrollTop=msgs.scrollHeight;
  const prov=API_PROVIDERS[pKey];
  const url=prov.buildUrl(S.keys[pKey],prov.model);
  let reqBody;
  if(pKey==='gemini'){
    reqBody={contents,generationConfig:{temperature:0.65,maxOutputTokens:300,topP:0.9},
      safetySettings:[{category:'HARM_CATEGORY_HARASSMENT',threshold:'BLOCK_NONE'},{category:'HARM_CATEGORY_HATE_SPEECH',threshold:'BLOCK_NONE'}]};
  } else {
    reqBody={model:prov.model,max_tokens:300,temperature:0.65,
      messages:contents.map(c=>({role:c.role==='model'?'assistant':'user',content:c.parts[0].text}))};
  }
  try {
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json',...(prov.extraHeaders?.(S.keys[pKey])||{})},body:JSON.stringify(reqBody)});
    const data=await res.json();
    const reply=prov.parseReply(data)||'(no response)';
    td.textContent=reply;
    S.newsChats[idx].push({role:'model',parts:[{text:reply}]});
    msgs.scrollTop=msgs.scrollHeight;
    S.msgs++; sp('db_msgs',S.msgs); updateStats();
  } catch(e){ td.textContent='⚠️ '+e.message; }
}

function showCard(idx) {
  document.querySelectorAll('.news-card').forEach(c=>c.classList.remove('active'));
  const card=document.getElementById('card-'+idx); if(card)card.classList.add('active');

  const next=document.getElementById('navNext');
  const ctr=document.getElementById('navCounter');
  if(prev)prev.disabled=idx===0;
  if(next)next.disabled=idx>=S.newsItems.length-1;
  if(ctr)ctr.textContent=`${idx+1} / ${S.newsItems.length}`;
  document.querySelectorAll('.nav-dot').forEach((d,i)=>d.classList.toggle('on',i===idx));
  S.newsIdx=idx;
}
function newsNav(dir){
  const n=S.newsIdx+dir;

  showCard(n);
  generateCardLesson(S.newsItems, n, S.newsMode, false);
}

/** Touch/swipe — attached once after cards rendered */
function attachSwipe() {
  const body = document.getElementById('newsBody');
  if (!body || body._swipeAttached) return;
  body._swipeAttached = true;
  let sx = 0, sy = 0;
  body.addEventListener('touchstart', e => { sx=e.touches[0].clientX; sy=e.touches[0].clientY; }, {passive:true});
  body.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - sx;
    const dy = Math.abs(e.changedTouches[0].clientY - sy);
    if (Math.abs(dx) > 48 && dy < 70) newsNav(dx < 0 ? 1 : -1);
  }, {passive:true});
}

  const c=document.getElementById('navDots'); if(!c)return;

}

function fmtBubble(t){
  if(t.includes('<strong>')||t.includes('<br>'))return t;
  t=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t=t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/\*([\wäöüÄÖÜß\-\s]{1,30}?)\*/g,'<span class="vocab">$1</span>');
  t=t.replace(/(➤ \d+\..+?)(?=\n|$)/g,'<span class="choice">$1</span>');
  t=t.replace(/✓(.+?)(?=\n|$)/g,'<span class="correct">✓$1</span>');
  t=t.replace(/\n/g,'<br>');
  return t;
}

// Vocabulary stored as array of objects in localStorage
function loadVocab(){ try{return JSON.parse(localStorage.getItem('db_vocab')||'[]');}catch(_){return [];} }
function saveVocabList(arr){ localStorage.setItem('db_vocab',JSON.stringify(arr)); }
function getSavedVocabWords(){ return new Set(loadVocab().map(v=>v.word)); }

function toggleSaveVocab(btn){
  const word    = btn.dataset.word;
  const meaning = btn.dataset.meaning;
  const example = btn.dataset.example;
  const source  = btn.dataset.source;
  const level   = btn.dataset.level;
  let vocab = loadVocab();
  const idx = vocab.findIndex(v=>v.word===word);
  if (idx>=0) {
    // Remove
    vocab.splice(idx,1);
    btn.textContent='☆'; btn.classList.remove('saved'); btn.title='Save to My Vocabulary';
    showToast(`Removed "${word}" from vocabulary`);
  } else {
    // Add
    vocab.unshift({word,meaning,example,source,level,added:new Date().toISOString()});
    if (vocab.length>500) vocab=vocab.slice(0,500); // cap at 500 words
    btn.textContent='★'; btn.classList.add('saved'); btn.title='Saved — click to remove';
    showToast(`⭐ Saved "${word}" to My Vocabulary`);
  }
  saveVocabList(vocab);
  // Update sidebar count
  const badge=document.getElementById('vocabBankCount');
  if(badge)badge.textContent=vocab.length;
}

/** Smart search/add: search existing words; if no match, treat as new word to add */
function vocabSmartSearch(q) {
  const hint = document.getElementById('vocabSmartHint');
  const body = document.getElementById('vocabBody');
  if (!q.trim()) {
    if (hint) hint.textContent = '';
    if (body) body.innerHTML = renderVocabBank();
    return;
  }
  const lower = q.toLowerCase().trim();
  const vocab = loadVocab();
  const matches = vocab.filter(v =>
    v.word.toLowerCase().includes(lower) ||
    (v.meaning||'').toLowerCase().includes(lower)
  );

  if (matches.length) {
    if (hint) hint.textContent = `${matches.length} word${matches.length>1?'s':''} found — press Enter or Go to view`;
    if (body) {
      const allVocab = loadVocab();
      body.innerHTML = `<div class="vocab-bank">${matches.map(v => {
        const i = allVocab.findIndex(av => av.word===v.word && av.added===v.added);
        return renderVocabCard(v, i);
      }).join('')}</div>`;
    }
  } else {
    if (hint) hint.innerHTML = `<span style="color:var(--gold)">✚ New word: "${escHtml(q)}" — press Enter or Go to add it</span>`;
    if (body) body.innerHTML = renderVocabBank(); // show all while typing
  }
}

/** Execute smart action: add new word if not found, or filter to matching */
function vocabSmartAction() {
  const input = document.getElementById('vocabSmartInput');
  if (!input) return;
  const q = input.value.trim();
  if (!q || q.length < 2) return;

  const vocab = loadVocab();
  const existing = vocab.find(v => v.word.toLowerCase() === q.toLowerCase());

  if (existing) {
    // Show just this word
    const idx = vocab.indexOf(existing);
    const body = document.getElementById('vocabBody');
    if (body) body.innerHTML = `<div class="vocab-bank">${renderVocabCard(existing, idx)}</div>`;
    const hint = document.getElementById('vocabSmartHint');
    if (hint) hint.innerHTML = `<span style="color:var(--green)">✓ "${escHtml(existing.word)}" is already saved — showing it below</span>`;
  } else {
    // Add as new word
    vocab.unshift({ word:q, meaning:'', example:'', source:'Manual', level:S.lv, added:new Date().toISOString() });
    if (vocab.length > 500) vocab.length = 500;
    saveVocabList(vocab);
    input.value = '';
    const hint = document.getElementById('vocabSmartHint');
    if (hint) hint.textContent = '';
    const badge = document.getElementById('vocabCountBadge');
    if (badge) badge.textContent = vocab.length + ' words';
    const bankBadge = document.getElementById('vocabBankCount');
    if (bankBadge) bankBadge.textContent = vocab.length;
    showToast(`⭐ Added "${q}" — loading details…`);
    autoEnrichWord(0);
    const body = document.getElementById('vocabBody');
    if (body) body.innerHTML = renderVocabBank();
  }
}

function ctxLookupWordDirect(word) {

/**
 * Enrich a saved vocabulary word using:
 * 1. Wiktionary API (authentic forms — not AI-generated)
 * 2. AI for: English meaning, synonyms, antonyms, usage context
 *
 * Wiktionary provides: word type, gender, plural, conjugation tables
 * AI provides: translation, synonyms, opposites, contextual example
 */
/**
 * Parse German wikitext from de.wiktionary.org to extract
 * actual German grammatical forms (noun cases, verb conjugations, etc.)
 * Returns a formatted string of "FormName: form" pairs.
 */
function parseGermanWikiforms(wikitext, word) {
  const lines = [];

  // ── Determine word type from wikitext header ──────────────────────
  const isNoun = /==\s*(Substantiv|Noun)\s*==|{{Wortart\|Substantiv/i.test(wikitext);
  const isVerb = /==\s*(Verb)\s*==|{{Wortart\|Verb/i.test(wikitext);
  const isAdj  = /==\s*(Adjektiv|Adjective)\s*==|{{Wortart\|Adjektiv/i.test(wikitext);

  // ── Extract noun forms ─────────────────────────────────────────────
  if (isNoun) {
    // Genus (grammatical gender)
    const genusM = wikitext.match(/\|Genus\s*=\s*([mfn])\b/i)
                || wikitext.match(/{{Wortart\|Substantiv[^}]*\|([mfn])\b/i);
    if (genusM) {
      const gMap = {m:'der (maskulin)',f:'die (feminin)',n:'das (neutrum)'};
      lines.push('Artikel: ' + (gMap[genusM[1]] || genusM[1]));
    }

    // Plural form
    const pluralM = wikitext.match(/\|Nominativ Plural\s*=\s*([^\|\n\r{}]+)/)
                 || wikitext.match(/\|Plural\s*=\s*([^\|\n\r{}]+)/);
    if (pluralM) lines.push('Plural (Nom.): ' + pluralM[1].trim());

    // Genitive singular
    const genM = wikitext.match(/\|Genitiv Singular\s*=\s*([^\|\n\r{}]+)/);
    if (genM) lines.push('Genitiv Sing.: ' + genM[1].trim());

    // Accusative
    const akkM = wikitext.match(/\|Akkusativ Singular\s*=\s*([^\|\n\r{}]+)/);
    if (akkM) lines.push('Akkusativ Sing.: ' + akkM[1].trim());
  }

  // ── Extract verb forms ─────────────────────────────────────────────
  if (isVerb) {
    // Infinitive (Grundform)
    lines.push('Infinitiv: ' + word);

    // 3rd person singular present
    const pres3M = wikitext.match(/\|Präsens_er,sie,es\s*=\s*([^\|\n\r{}]+)/)
                || wikitext.match(/\|3\. Sg\. Präsens\s*=\s*([^\|\n\r{}]+)/);
    if (pres3M) lines.push('Präsens (er/sie/es): ' + pres3M[1].trim());

    // Präteritum (simple past)
    const pretM = wikitext.match(/\|Präteritum_ich\s*=\s*([^\|\n\r{}]+)/)
               || wikitext.match(/\|1\. Sg\. Prät\.\s*=\s*([^\|\n\r{}]+)/);
    if (pretM) lines.push('Präteritum (ich): ' + pretM[1].trim());

    // Partizip II
    const partM = wikitext.match(/\|Partizip II\s*=\s*([^\|\n\r{}]+)/)
               || wikitext.match(/\|Partizip_II\s*=\s*([^\|\n\r{}]+)/);
    if (partM) lines.push('Partizip II: ' + partM[1].trim());

    // Auxiliary (haben/sein)
    const auxM = wikitext.match(/\|Hilfsverb\s*=\s*([^\|\n\r{}]+)/);
    if (auxM) lines.push('Hilfsverb: ' + auxM[1].trim());
  }

  // ── Extract adjective forms ────────────────────────────────────────
  if (isAdj) {
    const compM = wikitext.match(/\|Komparativ\s*=\s*([^\|\n\r{}]+)/);
    if (compM) lines.push('Komparativ: ' + compM[1].trim());
    const superM = wikitext.match(/\|Superlativ\s*=\s*([^\|\n\r{}]+)/);
    if (superM) lines.push('Superlativ: am ' + superM[1].trim().replace(/^am /,''));
  }

  // ── Fallback: extract any key=value forms from inflection templates ─
  if (!lines.length) {
    const kvMatches = [...wikitext.matchAll(/\|([^|=\n]{3,30})\s*=\s*([^\|\n\r{}]{2,40})/g)];
    const skip = /Bild|Bild2|Kategorie|Seite|ISBN|url|ref|Quelle/i;
    let count = 0;
    for (const m of kvMatches) {
      if (skip.test(m[1])) continue;
      const key = m[1].trim(), val = m[2].trim();
      if (val && val !== '—' && val !== '-' && count < 6) {
        lines.push(key + ': ' + val);
        count++;
      }
    }
  }

  return lines.join('\n');
}

async function enrichVocabItem(vocabIdx, silent = false) {
  const pKey = 'gemini'; // MODES.free removed; always use gemini for vocab enrichment
  const key  = S.keys[pKey];
  if (!key) { if (!silent) showToast('🔑 Add API key in ⚙ Settings'); return; }

  const vocabList = loadVocab();
  const item = vocabList[vocabIdx];
  if (!item) return;

  const btn = document.getElementById('enrich-'+vocabIdx);
  if (btn) { btn.textContent = '⏳ Loading…'; btn.disabled = true; }

  try {
    // ── Step 1: Wiktionary MediaWiki API (authentic German grammatical forms) ──
    // We use the action=parse API which returns wikitext with inflection tables.
    // This gives us actual German noun/verb/adjective forms, not English definitions.
    let wiktForms = '';
    try {
      // Use the German Wiktionary (de.wiktionary.org) for authentic German forms
      const wiktUrl = `https://de.wiktionary.org/w/api.php?action=parse&page=${encodeURIComponent(item.word)}&prop=wikitext&format=json&origin=*`;
      const wRes = await Promise.race([
        fetch(wiktUrl),
        new Promise((_,r) => setTimeout(() => r(new Error('timeout')), 8000))
      ]);
      if (wRes.ok) {
        const wJson = await wRes.json();
        const wikitext = wJson?.parse?.wikitext?.['*'] || '';
        if (wikitext) {
          wiktForms = parseGermanWikiforms(wikitext, item.word);
        }
      }
    } catch(wErr) { console.warn('Wiktionary failed:', wErr.message); }

    // ── Step 2: AI for meaning, synonyms, antonyms, context ───────────
    // AI only provides context, translation, synonyms, antonyms.
    // Grammar forms come from Wiktionary — NOT from AI.
    const provider = API_PROVIDERS[pKey];
    const contextSentence = item.example ? `The word was saved from this context: "${item.example}"` : '';

    const aiPrompt =
`Analyze the German word: "${item.word}"
${contextSentence}

Reply with ONLY these fields on separate lines:

WORD_TYPE: [noun / verb / adjective / adverb / other]
ENGLISH: [concise English translation]
SYNONYMS: [3-5 German synonyms, comma-separated]
ANTONYMS: [3-5 German antonyms or opposites, comma-separated. Write "none" if truly no opposites]
CONTEXT_SENTENCE_DE: [natural German sentence using "${item.word}" in a meaningful context]
CONTEXT_SENTENCE_EN: [English translation of the above sentence]
USAGE_NOTE: [one brief tip about register, collocations, or common mistakes — max 20 words]`;

    const contents = [{role:'user', parts:[{text: aiPrompt}]}];
    let reqBody;
    if (pKey === 'gemini') {
      reqBody = {contents, generationConfig:{temperature:0.25, maxOutputTokens:350, topP:0.85}};
    } else {
      reqBody = {model:provider.model, max_tokens:350, temperature:0.25,
        messages:contents.map(c=>({role:'user',content:c.parts[0].text}))};
    }

    const url  = provider.buildUrl(key, provider.model);
    const hdrs = {'Content-Type':'application/json', ...(provider.extraHeaders?.(key)||{})};
    const res  = await fetch(url, {method:'POST', headers:hdrs, body:JSON.stringify(reqBody)});
    const data = await res.json();
    const text = provider.parseReply(data);
    if (!text) throw new Error('Empty AI response');

    const getField = name => {
      const m = text.match(new RegExp(name + ':\s*(.+?)(?=\n[A-Z_]+:|$)', 's'));
      return m ? m[1].trim() : '';
    };

    const wordType       = getField('WORD_TYPE').toLowerCase();
    const english        = getField('ENGLISH');
    const synonyms       = getField('SYNONYMS');
    const antonyms       = getField('ANTONYMS');
    const ctxDe          = getField('CONTEXT_SENTENCE_DE');
    const ctxEn          = getField('CONTEXT_SENTENCE_EN');
    const usageNote      = getField('USAGE_NOTE');

    // ── Step 3: Update vocab item ───────────────────────────────────────
    const updated = loadVocab();
    const target  = updated[vocabIdx];
    if (!target) return;

    target.wordType  = wordType  || target.wordType;
    target.meaning   = english   || target.meaning;
    target.synonyms  = synonyms  !== 'none' ? synonyms  : '';
    target.antonyms  = antonyms  !== 'none' ? antonyms  : '';
    target.wiktForms = wiktForms || target.wiktForms;
    target.usageNote = usageNote || target.usageNote;
    // Preserve original saved-from context; add AI context only if none exists
    if (!target.example || target.example.length < 20) {
      target.example = ctxDe ? `${ctxDe} [${ctxEn}]` : target.example;
    } else if (ctxDe) {
      target.aiExample = `${ctxDe} [${ctxEn}]`;
    }
    target.enriched  = true;
    target.enrichedAt = new Date().toISOString();

    saveVocabList(updated);

    if (!silent) {
      showToast(`✅ Details loaded for "${item.word}"`);
      const body = document.getElementById('vocabBody');
      if (body) body.innerHTML = renderVocabBank();
    } else {
      // Silent mode: re-render if vocab tab is currently visible
      if (S.mode === 'vocabbank') {
        const body = document.getElementById('vocabBody');
        if (body) body.innerHTML = renderVocabBank();
      }
    }

  } catch(e) {
    console.warn('Vocab enrichment failed:', e.message);
    if (btn) { btn.textContent = '⚠️ Retry'; btn.disabled = false; }
    if (!silent) showToast(`⚠️ Could not load details: ${e.message}`);
  }
}

/**
 * Auto-enrich newly saved word in background.
 * 2s delay to avoid hitting rate limits during lesson generation.
 */
function autoEnrichWord(vocabIdx) {
  const pKey = 'gemini'; // MODES.free removed; always use gemini for vocab enrichment
  if (!S.keys[pKey]) return;
  setTimeout(() => enrichVocabItem(vocabIdx, true), 2000);
}


function showVocabTab(tab){
  document.querySelectorAll('.vocab-tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('vtab-'+tab)?.classList.add('on');
  const body=document.getElementById('vocabBody'); if(!body)return;

  }
}

let fcState={cards:[],idx:0,revealed:false,score:{right:0,wrong:0}};

function renderFlashcards(){
  const vocab=loadVocab();
  if(!vocab.length)return`<div class="vocab-empty"><div class="vocab-empty-icon">🃏</div><p>Save some vocabulary words first, then come back to practice!</p></div>`;
  // Shuffle
  fcState.cards=[...vocab].sort(()=>Math.random()-.5);
  fcState.idx=0; fcState.revealed=false; fcState.score={right:0,wrong:0};
  return flashcardHTML();
}

function flashcardHTML(){
  const cards=fcState.cards, idx=fcState.idx;
  if(idx>=cards.length)return`
    <div class="flashcard-wrap">
      <div class="flashcard" style="pointer-events:none">
        <div style="font-size:40px;margin-bottom:12px">🎉</div>
        <div class="flashcard-word">Fertig!</div>
        <div class="flashcard-answer">Score: ${fcState.score.right} correct / ${fcState.score.wrong} to review</div>
      </div>
      <button class="btn-gold" onclick="showVocabTab('practice')">Practice Again</button>
    </div>`;
  const card=cards[idx];
  const rev=fcState.revealed;
  return`
    <div class="flashcard-wrap">
      <div class="fc-score">${idx+1} / ${cards.length} · ✓ ${fcState.score.right} · ✗ ${fcState.score.wrong}</div>
      <div class="flashcard" onclick="revealFlashcard()">
        <div class="flashcard-word">${escHtml(card.word)}</div>
        ${!rev?`<div class="flashcard-hint">Tap to reveal meaning</div>`:`
          <div class="flashcard-answer">
            ${escHtml(card.meaning||'')}
            ${card.example?`<div style="font-size:12px;color:var(--text3);margin-top:8px;font-style:italic">"${escHtml(card.example)}"</div>`:''}
          </div>`}
      </div>
      ${rev?`
        <div class="fc-btns">
          <button class="fc-btn wrong" onclick="fcAnswer(false)">✗ Still learning</button>
          <button class="fc-btn right" onclick="fcAnswer(true)">✓ Got it</button>
        </div>`:`<div class="fc-score" style="color:var(--text3)">Tap card to see meaning</div>`}
    </div>`;
}

function revealFlashcard(){
  fcState.revealed=true;
  const body=document.getElementById('vocabBody'); if(body)body.innerHTML=flashcardHTML();
}
function fcAnswer(correct){
  if(correct)fcState.score.right++;else fcState.score.wrong++;
  fcState.idx++; fcState.revealed=false;
  const body=document.getElementById('vocabBody'); if(body)body.innerHTML=flashcardHTML();
}

/* ── Match Test ────────────────────────────────────────────────────────
   Shows 5 German words on the left and 5 English meanings shuffled on
   the right. User clicks a word then a meaning to match them.
   ───────────────────────────────────────────────────────────────────── */
let matchState = { pairs:[], selWord:null, selMean:null, matched:[], wrong:[], tries:0 };

function renderMatchTest() {
  const vocab = loadVocab().filter(v => v.meaning && v.meaning.trim());
  if (vocab.length < 3) return `
    <div class="vocab-empty">
      <div class="vocab-empty-icon">🎯</div>
      <p>Save at least 3 words with English meanings to use the match test.<br>
      Click ✨ on vocab cards to load meanings first.</p>
    </div>`;

  // Pick 5 random words
  const shuffled = [...vocab].sort(() => Math.random() - .5).slice(0, 5);
  matchState = {
    pairs:   shuffled.map(v => ({ word: v.word, mean: v.meaning.split(/[,;]/)[0].trim().substring(0,40) })),
    selWord: null, selMean: null,
    matched: [], wrong: [], tries: 0,
  };
  return buildMatchHTML();
}

function buildMatchHTML() {
  const { pairs, matched, wrong, selWord, selMean } = matchState;
  const meanings = [...pairs].sort(() => Math.random() - .5);
  // Keep meanings order stable after first render
  if (!matchState._meanOrder) matchState._meanOrder = [...pairs].sort(() => Math.random() - .5);
  const orderedMeans = matchState._meanOrder;

  const allMatched = matched.length === pairs.length;

  return `
    <div style="padding:20px;max-width:700px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div style="font-family:var(--fm);font-size:13px;color:var(--text3)">
          ✓ ${matchState.matched.length} matched · ${matchState.tries} attempts
        </div>
        <button class="btn-generate" onclick="showVocabTab('match')">New round</button>
      </div>

      ${allMatched ? `
        <div class="ex-feedback correct show" style="margin-bottom:16px;font-size:15px;text-align:center">
          🎉 All matched! ${matchState.tries} attempts for ${pairs.length} pairs.
          <br><button class="btn-submit" style="margin-top:10px" onclick="showVocabTab('match')">Play again</button>
        </div>` : ''}

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <div style="font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:8px">🇩🇪 German</div>
          ${pairs.map((p, i) => {
            const isMatched = matched.includes(i);
            const isWrong   = wrong.includes('w' + i);
            const isSel     = selWord === i;
            return `<div class="match-card ${isMatched?'matched':''} ${isWrong?'wrong-flash':''} ${isSel?'selected':''}"
              id="mw-${i}" onclick="selectMatchWord(${i})"
              style="cursor:${isMatched?'default':'pointer'}">
              ${escHtml(p.word)}
            </div>`;
          }).join('')}
        </div>
        <div>
          <div style="font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:8px">🇬🇧 English</div>
          ${orderedMeans.map((p, i) => {
            const pairIdx   = pairs.findIndex(pp => pp.mean === p.mean);
            const isMatched = matched.includes(pairIdx);
            const isWrong   = wrong.includes('m' + i);
            const isSel     = selMean === i;
            return `<div class="match-card ${isMatched?'matched':''} ${isWrong?'wrong-flash':''} ${isSel?'selected':''}"
              id="mm-${i}" onclick="selectMatchMean(${i})"
              style="cursor:${isMatched?'default':'pointer'}">
              ${escHtml(p.mean)}
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>`;
}

function selectMatchWord(idx) {
  if (matchState.matched.includes(idx)) return;
  matchState.selWord = idx;
  if (matchState.selMean !== null) tryMatch();
  else refreshMatch();
}

function selectMatchMean(idx) {
  if (matchState.matched.includes(matchState.pairs.findIndex(p => p.mean === matchState._meanOrder[idx].mean))) return;
  matchState.selMean = idx;
  if (matchState.selWord !== null) tryMatch();
  else refreshMatch();
}

function tryMatch() {
  const { selWord, selMean, pairs, _meanOrder } = matchState;
  matchState.tries++;
  const wordPair = pairs[selWord];
  const meanPair = _meanOrder[selMean];
  if (wordPair.mean === meanPair.mean) {
    // Correct match
    matchState.matched.push(selWord);
    matchState.selWord = null; matchState.selMean = null;
    refreshMatch();
  } else {
    // Wrong — flash red then clear
    matchState.wrong = ['w'+selWord, 'm'+selMean];
    refreshMatch();
    setTimeout(() => {
      matchState.wrong = []; matchState.selWord = null; matchState.selMean = null;
      refreshMatch();
    }, 700);
  }
}

function refreshMatch() {
  const body = document.getElementById('vocabBody');
  if (body) body.innerHTML = buildMatchHTML();
}
function deleteVocabItem(idx){
  const v=loadVocab(); v.splice(idx,1); saveVocabList(v);
  showToast('Word removed');
  showVocabTab('bank');
  const badge=document.getElementById('vocabCountBadge');
  if(badge)badge.textContent=`${v.length} words`;
  const sbBadge=document.getElementById('vocabBankCount');
  if(sbBadge)sbBadge.textContent=v.length;
}
function clearAllVocab(){
  if(!confirm('Remove all saved vocabulary?'))return;
  saveVocabList([]);
  showToast('All vocabulary cleared');
  renderVocabPanel();
}

  const section = ES.section;

  const sectionPrompts = {
    'Leseverstehen': `Create a Goethe-Institut ${lv} Leseverstehen exercise.

/** Parse AI response into structured exercise objects */
function parseExamResponse(text, section) {
  const exs = [];

  if (section === 'Grammatik') {
    const blocks = text.split(/\n(?=G\d+\s*:)/i).filter(b => b.trim());
    for (const block of blocks) {
      const sentM = block.match(/G\d+\s*:\s*(.+?)(?=\nANSWER:|$)/si);
      const ansM  = block.match(/ANSWER\s*:\s*(.+?)(?=\nHINT:|$)/si);
      const hintM = block.match(/HINT\s*:\s*(.+?)(?=\n|$)/si);
      if (sentM && ansM) {
        exs.push({
          type: 'gap',
          sentence: sentM[1].trim(),
          answer:   ansM[1].trim(),
          hint:     hintM?.[1]?.trim() || '',
        });
      }
    }
  } else if (section === 'Leseverstehen') {
    // Extract reading text — store on ES so it persists across questions
    const textM = text.match(/TEXT\s*:\s*([\s\S]+?)(?=\nQ1\s*:)/i);
    const readText = textM ? textM[1].trim() : '';
    ES._readText = readText; // PERSIST across questions

    const qBlocks = text.split(/\n(?=Q\d+\s*:)/i).filter(b => /^Q\d+/i.test(b.trim()));
    for (const block of qBlocks) {
      const qM    = block.match(/Q\d+\s*:\s*(.+?)(?=\na\))/si);
      const optM  = block.match(/a\)\s*(.+?)\s*b\)\s*(.+?)\s*c\)\s*(.+?)\s*d\)\s*(.+?)(?=\nCORRECT:|$)/si);
      const corrM = block.match(/CORRECT\s*:\s*([abcd])/i);
      const expM  = block.match(/EXPLANATION\s*:\s*(.+?)(?=\n|$)/si);
      if (qM && optM && corrM) {
        exs.push({
          type:        'mcq',
          question:    qM[1].trim(),
          options:     [optM[1].trim(), optM[2].trim(), optM[3].trim(), optM[4].trim()],
          correct:     corrM[1].toLowerCase().charCodeAt(0) - 97,
          explanation: expM?.[1]?.trim() || '',
        });
      }
    }
  } else if (section === 'Schreiben') {
    const taskBlocks = text.split(/TASK_START\s*/i).filter(b => b.trim());
    for (const block of taskBlocks) {
      const end      = block.indexOf('TASK_END');
      const content  = end > 0 ? block.substring(0, end) : block;
      const taskM    = content.match(/TASK\s*:\s*([\s\S]+?)(?=BULLET_POINTS:|$)/i);
      const bullM    = content.match(/BULLET_POINTS\s*:\s*([\s\S]+?)(?=MODEL_ANSWER:|$)/i);
      const modelM   = content.match(/MODEL_ANSWER\s*:\s*([\s\S]+?)(?=FOLLOW_UP_1:|$)/i);
      const fup1M    = content.match(/FOLLOW_UP_1\s*:\s*(.+?)(?=\nFOLLOW_UP_2:|$)/si);
      const fup2M    = content.match(/FOLLOW_UP_2\s*:\s*(.+?)(?=\n|$)/si);
      if (taskM) {
        exs.push({
          type:       'writing',
          task:       taskM[1].trim(),
          bullets:    bullM?.[1]?.trim() || '',
          modelAnswer:modelM?.[1]?.trim() || '',
          followUp1:  fup1M?.[1]?.trim() || '',
          followUp2:  fup2M?.[1]?.trim() || '',
          _phase:     'write', // 'write' | 'followup1' | 'followup2'
        });
      }
    }
  } else if (section === 'Sprechen') {
    const taskBlocks = text.split(/TASK_START\s*/i).filter(b => b.trim());
    for (const block of taskBlocks) {
      const end     = block.indexOf('TASK_END');
      const content = end > 0 ? block.substring(0, end) : block;
      const scenM   = content.match(/SCENARIO\s*:\s*([\s\S]+?)(?=PROMPTS:|$)/i);
      const promM   = content.match(/PROMPTS\s*:\s*([\s\S]+?)(?=MODEL_RESPONSE:|$)/i);
      const respM   = content.match(/MODEL_RESPONSE\s*:\s*([\s\S]+?)(?=TASK_END|$)/i);
      if (scenM) {
        exs.push({
          type:      'speaking',
          scenario:  scenM[1].trim(),
          prompts:   promM?.[1]?.trim() || '',
          modelResp: respM?.[1]?.trim() || '',
        });
      }
    }
  }

  return exs;
}

      <button class="btn-next show" onclick="nextExercise()" style="display:block;margin-top:12px">Weiter →</button>
    </div>`;
  }
}

/** Move to next writing phase or next exercise */
function nextWritingPhase() {
  const ex = ES.exercises[ES.current];
  if (!ex) return nextExercise();
  const phase = ex._phase || 'write';
  if (phase === 'write' && ex.followUp1) {
    ex._phase = 'followup1';
    renderCurrentExercise();
  } else if (phase === 'followup1' && ex.followUp2) {
    ex._phase = 'followup2';
    renderCurrentExercise();
  } else {
    nextExercise();
  }
}

/** Submit gap-fill */
function submitGap() {
  const ex = ES.exercises[ES.current];
  if (!ex || ex._done) return;
  const input   = document.getElementById('gapInput');
  const fb      = document.getElementById('gapFeedback');
  const btnNext = document.getElementById('btnNext');
  if (!input) return;

  const userAns = input.value.trim().toLowerCase().replace(/\s+/g,' ');
  const correct = ex.answer.toLowerCase().replace(/\s+/g,' ');
  // Accept partial match (e.g. "bin" matches "bin gegangen")
  const isCorrect = userAns === correct
    || correct.split('/').map(s=>s.trim()).includes(userAns)
    || correct.includes(userAns) && userAns.length > 2;

  ex._done = true;
  ES.score.total++;

  if (isCorrect) {
    ES.score.right++;
    input.classList.add('correct');
    if (fb) { fb.className='ex-feedback correct show';
      fb.innerHTML = `✓ Richtig! <strong>${escHtml(ex.answer)}</strong>${ex.hint ? ` — ${escHtml(ex.hint)}` : ''}`; }
  } else {
    input.classList.add('wrong');
    if (fb) { fb.className='ex-feedback wrong show';
      fb.innerHTML = `✗ Falsch. Richtig: <strong>${escHtml(ex.answer)}</strong>${ex.hint ? `<br><em style="font-size:12px">${escHtml(ex.hint)}</em>` : ''}`; }
  }
  if (btnNext) btnNext.style.display='block';
  document.getElementById('examScore').textContent = `${ES.score.right} / ${ES.score.total}`;
}

/** Submit MCQ */
function submitMcq(idx) {
  const ex = ES.exercises[ES.current];
  if (!ex || ex._done) return;
  ex._done = true;
  ES.score.total++;

  const opts    = document.querySelectorAll('.ex-option');
  const fb      = document.getElementById('mcqFeedback');
  const btnNext = document.getElementById('btnNext');

  opts.forEach((o, i) => {
    if (i === ex.correct) o.classList.add('correct');
    else if (i === idx)   o.classList.add('wrong');
    o.style.pointerEvents = 'none';
  });

  const isRight = idx === ex.correct;
  if (isRight) ES.score.right++;
  if (fb) {
    fb.className = `ex-feedback ${isRight?'correct':'wrong'} show`;
    fb.innerHTML = isRight
      ? `✓ Richtig!${ex.explanation ? ` ${escHtml(ex.explanation)}` : ''}`
      : `✗ Falsch. Richtig: <strong>${['a','b','c','d'][ex.correct]}) ${escHtml(ex.options[ex.correct])}</strong>${ex.explanation ? `<br><em>${escHtml(ex.explanation)}</em>` : ''}`;
  }
  if (btnNext) btnNext.style.display='block';
  document.getElementById('examScore').textContent = `${ES.score.right} / ${ES.score.total}`;
}

/** Submit writing — AI grades */
async function submitWriting() {
  const ex  = ES.exercises[ES.current];
  const inp = document.getElementById('writingInput');
  const fb  = document.getElementById('writingFeedback');
  if (!inp || !fb) return;
  const answer = inp.value.trim();
  if (answer.length < 15) { showToast('Bitte schreiben Sie mindestens ein paar Sätze.'); return; }
  if (ex?._graded) { showToast('Already graded — use Next to continue.'); return; }

  fb.className = 'ex-feedback info show';
  fb.innerHTML = '⏳ Bewertet Ihre Antwort…';
  inp.disabled = true;

  const pKey = MODES.exam.apiProvider || 'gemini';
  if (!S.keys[pKey]) { fb.textContent = '🔑 Add API key to get AI grading.'; return; }

  const phase  = ex?._phase || 'write';
  const taskText = phase === 'followup1' ? ex.followUp1 : phase === 'followup2' ? ex.followUp2 : ex.task;

  const gradePrompt =
    `Grade this German ${S.lv} writing response.\nTASK: ${taskText}\nSTUDENT: ${answer}\n\n` +
    `Reply in this format:\nSCORE: [0-100]\nFEEDBACK: [2-3 sentences of specific feedback]\nCORRECTIONS: [2-3 key corrections with explanations]`;

  const provider = API_PROVIDERS[pKey];
  try {
    let reqBody = pKey === 'gemini'
      ? {contents:[{role:'user',parts:[{text:gradePrompt}]}], generationConfig:{temperature:0.4,maxOutputTokens:400}}
      : {model:provider.model, max_tokens:400, temperature:0.4, messages:[{role:'user',content:gradePrompt}]};
    const res   = await fetch(provider.buildUrl(S.keys[pKey],provider.model),
      {method:'POST', headers:{'Content-Type':'application/json',...(provider.extraHeaders?.(S.keys[pKey])||{})},
       body:JSON.stringify(reqBody)});
    const data  = await res.json();
    const text  = provider.parseReply(data) || '';
    const scoreM= text.match(/SCORE\s*:\s*(\d+)/i);
    const score = scoreM ? parseInt(scoreM[1]) : 50;
    if (score >= 60) ES.score.right++;
    ES.score.total++;
    document.getElementById('examScore').textContent = `${ES.score.right} / ${ES.score.total}`;
    fb.className = `ex-feedback ${score>=60?'correct':'info'} show`;
    fb.innerHTML = `<strong>Bewertung: ${score}/100</strong><br>${escHtml(text.replace(/SCORE:.*?\n/i,'').trim())}`;
    if (ex) ex._graded = true;
    const btnNext = document.getElementById('btnNext');
    if (btnNext) btnNext.style.display = 'block';
  } catch(e) {
    fb.className = 'ex-feedback wrong show';
    fb.textContent = '⚠️ Bewertung fehlgeschlagen: ' + e.message;
    inp.disabled = false;
  }
}

/** Submit speaking */
async function submitSpeaking() {

/* ─── FULL MOCK TEST ────────────────────────────────────────────────────
   Timed mock: 60 min, all sections in sequence, submit at end.
   ───────────────────────────────────────────────────────────────────── */
let _mockTimerInterval = null;
let _mockSecondsLeft   = 0;

function clearMockTimer() {
  if (_mockTimerInterval) { clearInterval(_mockTimerInterval); _mockTimerInterval = null; }
  const t = document.getElementById('examTimer');
  if (t) t.style.display = 'none';
}

function renderFullMockStart() {
  const area = document.getElementById('examExerciseArea');
  if (!area) return;
  const mins = S.lv === 'A1' ? 45 : S.lv === 'A2' ? 55 : S.lv === 'B1' ? 65 : 90;
  area.innerHTML = `<div class="ex-card" style="text-align:center;padding:30px">
    <div style="font-size:44px;margin-bottom:14px">⏱️</div>
    <h3>Full Mock Test — ${S.lv}</h3>
    <div class="ex-text" style="text-align:left;margin:16px 0">
      <strong>Prüfungszeit:</strong> ${mins} Minuten<br>
      <strong>Sections:</strong> Leseverstehen · Grammatik · Schreiben · Sprechen<br>
      <strong>Level:</strong> ${S.lv} (${LEVELS[S.lv].name})<br><br>
      The timer starts when you click Begin. All exercises are generated fresh.
      You can navigate between questions. Submit at the end to see your results.
    </div>
    <button class="btn-submit" onclick="startFullMock(${mins})">
      ▶ Prüfung beginnen (${mins} min)
    </button>
  </div>`;
}

async function startFullMock(minutes) {
  const pKey = MODES.exam.apiProvider || 'gemini';
  if (!S.keys[pKey]) { showToast('🔑 Add API key in Settings'); return; }

  const area = document.getElementById('examExerciseArea');
  area.innerHTML = `<div class="ex-card" style="text-align:center;padding:30px">
    <div class="spinner" style="margin:0 auto 14px"></div>
    <p style="color:var(--text2)">Generating full mock test…</p>
  </div>`;

  // Set timer
  _mockSecondsLeft = minutes * 60;
  const timerEl = document.getElementById('examTimer');
  if (timerEl) {
    timerEl.style.display = 'block';
    timerEl.textContent = formatTime(_mockSecondsLeft);
  }
  _mockTimerInterval = setInterval(() => {
    _mockSecondsLeft--;
    if (timerEl) timerEl.textContent = formatTime(_mockSecondsLeft);
    if (_mockSecondsLeft <= 0) { clearMockTimer(); submitFullMock(); }
    if (_mockSecondsLeft === 300) showToast('⏰ 5 Minuten verbleibend!');
  }, 1000);

  // Generate all sections
  const lv = S.lv;
  const mockPrompt = `Create a compact Goethe-Institut ${lv} mock exam with all sections.

SECTION_LESEN:
TEXT:
[German reading text, 100-130 words at ${lv}]
Q1: [question] a) [opt] b) [opt] c) [opt] d) [opt] CORRECT: [a/b/c/d] EXPLANATION: [brief]
Q2: [same format]
Q3: [same format]

SECTION_GRAMMATIK:
G1: [sentence with ___] ANSWER: [word] HINT: [hint]
G2: [same] ANSWER: [word] HINT: [hint]
G3: [same] ANSWER: [word] HINT: [hint]
G4: [same] ANSWER: [word] HINT: [hint]
G5: [same] ANSWER: [word] HINT: [hint]

SECTION_SCHREIBEN:
TASK: [writing task, 40-50 words]
BULLET_POINTS:
• [point 1]
• [point 2]
• [point 3]
MODEL_ANSWER: [80-100 word model answer]

SECTION_SPRECHEN:
SCENARIO: [situation, 30-40 words]
PROMPTS:
1. [prompt]
2. [prompt]
3. [prompt]
MODEL_RESPONSE: [60-80 word model response]`;

  const provider = API_PROVIDERS[pKey];
  try {
    let reqBody = pKey==='gemini'
      ? {contents:[{role:'user',parts:[{text:mockPrompt}]}],generationConfig:{temperature:0.7,maxOutputTokens:2500}}
      : {model:provider.model,max_tokens:2500,temperature:0.7,messages:[{role:'user',content:mockPrompt}]};
    const res  = await fetch(provider.buildUrl(S.keys[pKey],provider.model),
      {method:'POST',headers:{'Content-Type':'application/json',...(provider.extraHeaders?.(S.keys[pKey])||{})},body:JSON.stringify(reqBody)});
    const data = await res.json();
    const text = provider.parseReply(data)||'';

    // Parse all sections
    ES.exercises = [];
    ES._readText = '';

    // Lesen
    const lesenBlock = text.match(/SECTION_LESEN\s*:([\s\S]+?)(?=SECTION_GRAMMATIK:|$)/i);
    if (lesenBlock) {
      const fakeText = lesenBlock[1]; // reuse Leseverstehen parser
      const lesenExs = parseExamResponse('TEXT:\n' + fakeText.replace(/SECTION_LESEN\s*:\s*/i,''), 'Leseverstehen');
      ES.exercises.push(...lesenExs);
    }
    // Grammatik
    const gramBlock = text.match(/SECTION_GRAMMATIK\s*:([\s\S]+?)(?=SECTION_SCHREIBEN:|$)/i);
    if (gramBlock) {
      const gramExs = parseExamResponse(gramBlock[1], 'Grammatik');
      ES.exercises.push(...gramExs);
    }
    // Schreiben
    const schreibBlock = text.match(/SECTION_SCHREIBEN\s*:([\s\S]+?)(?=SECTION_SPRECHEN:|$)/i);
    if (schreibBlock) {
      const schreibText = 'TASK_START\n' + schreibBlock[1].trim() + '\nTASK_END';
      const schreibExs  = parseExamResponse(schreibText, 'Schreiben');
      ES.exercises.push(...schreibExs);
    }
    // Sprechen
    const sprechBlock = text.match(/SECTION_SPRECHEN\s*:([\s\S]+?)(?=$)/i);
    if (sprechBlock) {
      const sprechText = 'TASK_START\n' + sprechBlock[1].trim() + '\nTASK_END';
      const sprechExs  = parseExamResponse(sprechText, 'Sprechen');
      ES.exercises.push(...sprechExs);
    }

    ES.current = 0; ES.score = {right:0,wrong:0,total:0};
    if (ES.exercises.length) {
      renderMockExercise();
    } else {
      area.innerHTML = `<div class="ex-card"><h3>⚠️ Could not parse mock test</h3>
        <button class="btn-submit" onclick="startFullMock(${minutes})">Retry</button></div>`;
    }
  } catch(e) {
    clearMockTimer();
    area.innerHTML = `<div class="ex-card"><h3>⚠️ Error</h3><p>${escHtml(e.message)}</p>
      <button class="btn-submit" onclick="startFullMock(${minutes})">Retry</button></div>`;
  }
}

/** Full mock: collect all answers silently, reveal only on final submit */
function renderMockExercise() {
  // In mock mode: disable per-exercise feedback/grading
  // Show simple navigation, collect answers, grade only at the end
  const area = document.getElementById('examExerciseArea');
  if (!area) return;
  const ex = ES.exercises[ES.current];
  if (!ex) { submitFullMock(); return; }

  const total = ES.exercises.length;
  const cur   = ES.current + 1;
  const keys  = ['a','b','c','d'];

  // Navigation bar
  const navDots = Array.from({length: total}, (_,i) => {
    const done = ES._mockAnswers && ES._mockAnswers[i] !== undefined;
    return `<div onclick="mockGoTo(${i})"
      style="width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
             cursor:pointer;font-size:11px;font-weight:700;transition:all .18s;
             background:${i===ES.current?'var(--blue)':done?'var(--greendim)':'var(--surface2)'};
             color:${i===ES.current?'#fff':done?'var(--green)':'var(--text3)'};
             border:1.5px solid ${i===ES.current?'var(--blue)':done?'var(--green)':'var(--border2)'}">
      ${i+1}
    </div>`;
  }).join('');

  // Initialize answer store
  if (!ES._mockAnswers) ES._mockAnswers = {};
  const saved = ES._mockAnswers[ES.current];

  let exHtml = '';

  if (ex.type === 'mcq') {
    exHtml = `
      ${ES._readText && ES.current === 0 ? `
        <div style="background:var(--lb);border:1px solid var(--lb-border);border-radius:12px;padding:14px 16px;margin-bottom:14px">
          <div style="font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--lb-text);margin-bottom:8px">📖 Lesetext</div>
          <div style="font-size:15px;line-height:1.9;color:var(--text)">${escHtml(ES._readText)}</div>
        </div>` : ''}

      <div style="display:flex;flex-direction:column;gap:8px" id="mockOpts">
        ${ex.options.map((opt,i) => `
          <div onclick="mockSelectMcq(${i})"
            style="padding:12px 16px;border-radius:10px;cursor:pointer;font-size:15px;
                   display:flex;align-items:center;gap:12px;transition:all .18s;
                   border:2px solid ${saved===i?'var(--gold)':'var(--border2)'};
                   background:${saved===i?'var(--golddim)':'var(--surface2)'}">
            <span style="width:28px;height:28px;border-radius:50%;background:var(--surface3);
                         display:inline-flex;align-items:center;justify-content:center;
                         font-size:12px;font-weight:700;flex-shrink:0">${keys[i]}</span>
            ${escHtml(opt)}
          </div>`).join('')}
      </div>`;
  } else if (ex.type === 'gap') {
    exHtml = `
      <div style="font-size:17px;line-height:2.2;margin-bottom:8px">
        ${escHtml(ex.sentence).replace('___', `<input id="mockGapInput" type="text"
          value="${saved||''}"
          onchange="ES._mockAnswers[${ES.current}]=this.value"
          style="background:var(--lb);border:2px solid var(--lb-border);border-radius:7px;
                 padding:3px 10px;color:var(--gold);font-family:var(--fm);font-size:15px;
                 width:120px;outline:none;text-align:center">`)}
      </div>
      ${ex.hint ? `<div style="font-size:13px;color:var(--text3);font-style:italic;margin-top:6px">💡 ${escHtml(ex.hint)}</div>` : ''}`;
  } else if (ex.type === 'writing') {
    exHtml = `
      <div style="font-size:15px;line-height:1.7;color:var(--text2);margin-bottom:12px;
                  background:var(--lb);border:1px solid var(--lb-border);border-radius:10px;padding:12px 14px">
        ${escHtml(ex.task)}
      </div>
      ${ex.bullets ? `<ul style="margin:0 0 12px 18px;color:var(--text2);font-size:14px;line-height:2">
        ${ex.bullets.split('\n').filter(l=>l.trim()).map(l=>`<li>${escHtml(l.replace(/^[•\-]\s*/,''))}</li>`).join('')}
      </ul>` : ''}
      <textarea id="mockWriteInput"
        style="width:100%;min-height:110px;background:var(--surface2);border:2px solid var(--border2);
               border-radius:10px;padding:12px;color:var(--text);font-family:var(--fu);font-size:15px;
               line-height:1.7;outline:none;resize:vertical"
        placeholder="Schreiben Sie Ihre Antwort auf Deutsch…"
        onchange="ES._mockAnswers[${ES.current}]=this.value">${saved||''}</textarea>`;
  } else if (ex.type === 'speaking') {

               line-height:1.7;outline:none;resize:vertical"

        <div style="display:flex;gap:8px">
          ${ES.current > 0 ? `<button class="btn-generate" onclick="mockGoTo(${ES.current-1})">← Zurück</button>` : ''}
          ${ES.current < total-1 ? `<button class="btn-submit" onclick="mockGoToNext()">Weiter →</button>` : ''}
        </div>
        <button onclick="submitFullMock()"
          style="padding:11px 28px;background:var(--green);border:none;border-radius:10px;
                 color:#0d1117;font-weight:700;font-size:14px;cursor:pointer">
          ✓ Prüfung abgeben

function mockGoTo(idx) {
  // Save current text inputs before navigating
  const gapIn = document.getElementById('mockGapInput');
  if (gapIn) ES._mockAnswers[ES.current] = gapIn.value;
  const writeIn = document.getElementById('mockWriteInput');
  if (writeIn) ES._mockAnswers[ES.current] = writeIn.value;
  const speakIn = document.getElementById('mockSpeakInput');
  if (speakIn) ES._mockAnswers[ES.current] = speakIn.value;
  ES.current = idx;
  renderMockExercise();
}

function mockGoToNext() {
  const gapIn = document.getElementById('mockGapInput');
  if (gapIn) ES._mockAnswers[ES.current] = gapIn.value;
  const writeIn = document.getElementById('mockWriteInput');
  if (writeIn) ES._mockAnswers[ES.current] = writeIn.value;
  const speakIn = document.getElementById('mockSpeakInput');
  if (speakIn) ES._mockAnswers[ES.current] = speakIn.value;
  mockSelectMcqSave();
  ES.current++;
  renderMockExercise();
}

function mockSelectMcq(idx) {
  if (!ES._mockAnswers) ES._mockAnswers = {};
  ES._mockAnswers[ES.current] = idx;
  renderMockExercise();
}

function mockSelectMcqSave() {
  // no-op: MCQ selection already saved in _mockAnswers via mockSelectMcq
}

function submitFullMock() {
  clearMockTimer();
  // Save any pending text inputs
  const gapIn = document.getElementById('mockGapInput');
  if (gapIn && ES._mockAnswers) ES._mockAnswers[ES.current] = gapIn.value;
  const writeIn = document.getElementById('mockWriteInput');
  if (writeIn && ES._mockAnswers) ES._mockAnswers[ES.current] = writeIn.value;
  const speakIn = document.getElementById('mockSpeakInput');
  if (speakIn && ES._mockAnswers) ES._mockAnswers[ES.current] = speakIn.value;

  // Auto-grade MCQ and gap answers
  let right = 0, total = 0;
  const results = [];
  (ES.exercises || []).forEach((ex, i) => {
    const userAnswer = ES._mockAnswers?.[i];
    if (ex.type === 'mcq') {
      total++;
      const correct = userAnswer === ex.correct;
      if (correct) right++;
      results.push({ ex, userAnswer, correct, type:'mcq' });
    } else if (ex.type === 'gap') {
      if (userAnswer && userAnswer.trim()) {
        total++;
        const ua = userAnswer.trim().toLowerCase();
        const ca = (ex.answer||'').toLowerCase();
        const correct = ua === ca || ca.split('/').map(s=>s.trim()).includes(ua);
        if (correct) right++;
        results.push({ ex, userAnswer, correct, type:'gap' });
      }
    } else {
      // Writing/speaking: count if answered
      if (userAnswer && userAnswer.trim().length > 15) {
        total++;
        right++; // credit for attempting
        results.push({ ex, userAnswer, correct: true, type: ex.type });
      }
    }
  });

  const pct = total > 0 ? Math.round((right/total)*100) : 0;
  const pass = pct >= 60;

  // Build results breakdown
  const breakdown = results.map((r, i) => {
    const label = r.type==='mcq'?'Leseverstehen':r.type==='gap'?'Grammatik':r.type==='writing'?'Schreiben':'Sprechen';
    const keys = ['a','b','c','d'];
    let detail = '';
    if (r.type === 'mcq') {
      detail = `<div style="font-size:13px;margin-top:4px">
        Ihre Antwort: <strong>${r.userAnswer!==undefined?keys[r.userAnswer]:'—'}</strong>
        ${!r.correct?` · Richtig: <strong>${keys[r.ex.correct]}) ${escHtml(r.ex.options[r.ex.correct])}</strong>`:''}
        ${r.ex.explanation?`<br><em style="color:var(--text3);font-size:12px">${escHtml(r.ex.explanation)}</em>`:''}
      </div>`;
    } else if (r.type === 'gap') {
      detail = `<div style="font-size:13px;margin-top:4px">
        Ihre Antwort: <strong>${escHtml(r.userAnswer||'—')}</strong>
        ${!r.correct?` · Richtig: <strong>${escHtml(r.ex.answer)}</strong>`:''}
      </div>`;
    } else {
      detail = `<div style="font-size:13px;margin-top:4px;color:var(--text3)">✓ Beantwortet (${(r.userAnswer||'').length} Zeichen)</div>`;
    }
    return `<div style="padding:10px 12px;background:${r.correct?'var(--greendim)':'var(--reddim)'};
              border:1px solid ${r.correct?'rgba(74,222,128,.2)':'rgba(248,113,113,.2)'};
              border-radius:8px;margin-bottom:7px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;font-weight:700;color:var(--text3)">${label} ${i+1}</span>
        <span style="font-size:13px;font-weight:700;color:${r.correct?'var(--green)':'var(--red)'}">
          ${r.correct?'✓ Richtig':'✗ Falsch'}
        </span>
      </div>
      ${detail}
    </div>`;
  }).join('');

  const area = document.getElementById('examExerciseArea');
  if (area) area.innerHTML = `
    <div class="ex-card">
      <div style="text-align:center;padding:10px 0 20px">
        <div style="font-size:52px;margin-bottom:10px">${pass?'🎉':'📚'}</div>
        <h3 style="font-size:22px;margin-bottom:6px">Prüfungsergebnis</h3>
        <div style="font-size:32px;font-weight:700;color:${pass?'var(--green)':'var(--red)'}">
          ${right}/${total} Punkte (${pct}%)
        </div>
        <div style="font-size:15px;margin-top:8px;color:${pass?'var(--green)':'var(--red)'}">
          ${pass?'✅ Bestanden! Sehr gut!':'❌ Nicht bestanden — weiterüben!'}
        </div>
        <div style="font-size:13px;color:var(--text3);margin-top:4px">
          Level: ${S.lv} · ${LEVELS[S.lv].name}
        </div>
      </div>

      ${results.length ? `
        <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px">Auswertung:</div>
        ${breakdown}` : ''}

      <div style="text-align:center;margin-top:16px">
        <button class="btn-submit" onclick="ES._mockAnswers={};renderFullMockStart()">
          Nochmal versuchen
        </button>
      </div>
    </div>`;

  document.getElementById('examScore').textContent = `${right} / ${total}`;
  ES._mockAnswers = {};
}

      // Clear lesson cache so new level generates fresh content
      if(S.newsItems.length){

          item._lessonDone = false;
          item._lessonHTML = null;

        renderNewsPanel(S.mode);

  document.querySelectorAll('.mcard').forEach(c=>c.classList.toggle('on',c.dataset.m===mode));

  const s=t.toLowerCase();
  if(/prüfung|exam|goethe|telc|zertifikat|mock test/i.test(s))return 'exam';
  if(/vokabel|vocabulary|mein.*wort|my.*vocab/i.test(s))return 'vocabbank';
  if(/\bspiel\b|game|abenteuer|\bstory\b/i.test(s))return 'game';
  if(/\bnews\b|nachrichten|headlines/i.test(s))return 'news';
  if(/\btech\b|ai|künstliche|wissenschaft|science/i.test(s))return 'tech';
  return null;
}

/* ════════════════════════════════════════════════════════
   RIGHT-CLICK VOCABULARY CONTEXT MENU
   ════════════════════════════════════════════════════════
   Right-click any word in a news article, summary, or lesson
   to get a menu: save to vocab bank, look up on dict.cc.
   Uses caretRangeFromPoint to detect the word under cursor.
   ════════════════════════════════════════════════════════ */

let _ctxWord    = '';   // currently right-clicked word/selection
let _ctxCardIdx = -1;   // which card it came from

/** Attach contextmenu listener to a news article element */
function attachCtxMenu(el, cardIdx) {
  el.addEventListener('contextmenu', e => {
    e.preventDefault();
    // Use text selection if available, else detect word at cursor
    const sel = window.getSelection()?.toString().trim() || '';
    const word = (sel.length > 0 && sel.length < 80) ? sel : getWordAtPoint(e.clientX, e.clientY);
    if (!word || word.length < 2) return;
    _ctxWord    = word;
    _ctxCardIdx = cardIdx;
    showCtxMenu(e.clientX, e.clientY, word);
  });
}

/** Detect the word under the cursor using browser caret APIs */
function getWordAtPoint(x, y) {
  try {
    let offset, node;
    if (document.caretRangeFromPoint) {
      const r = document.caretRangeFromPoint(x, y);
      offset = r.startOffset; node = r.startContainer;
    } else if (document.caretPositionFromPoint) {
      const p = document.caretPositionFromPoint(x, y);
      offset = p.offset; node = p.offsetNode;
    } else return '';
    if (node?.nodeType !== Node.TEXT_NODE) return '';
    const txt = node.textContent || '';
    const isWordChar = c => /[\wäöüÄÖÜß]/.test(c);
    let s = offset, e = offset;
    while (s > 0 && isWordChar(txt[s-1])) s--;
    while (e < txt.length && isWordChar(txt[e])) e++;
    return txt.slice(s, e).trim();
  } catch(_) { return ''; }
}

function showCtxMenu(x, y, word) {
  const menu    = document.getElementById('wordCtxMenu');
  const label   = document.getElementById('wordCtxLabel');
  const meaning = document.getElementById('wordCtxMeaning');
  if (!menu || !label) return;
  label.textContent = '"' + word + '"';
  if (meaning) meaning.textContent = '…';
  menu.style.display = 'block';
  // Keep within viewport
  const vw = window.innerWidth, vh = window.innerHeight;
  menu.style.left = Math.min(x + 4, vw - 220) + 'px';
  menu.style.top  = Math.min(y + 4, vh - 155) + 'px';

  // Quick meaning lookup — check saved vocab first, then Wiktionary
  const saved = loadVocab().find(v => v.word.toLowerCase() === word.toLowerCase());
  if (saved?.meaning) {
    if (meaning) meaning.textContent = saved.meaning;
    return;
  }

  // Fetch 1-2 English meanings from English Wiktionary (fast, CORS-enabled)
  if (meaning) {
    const wiktUrl = `https://en.wiktionary.org/api/rest_v1/page/definition/${encodeURIComponent(word)}`;
    fetch(wiktUrl, {headers:{'accept':'application/json'}})
      .then(r => r.ok ? r.json() : null)
      .then(json => {
        if (!json) return;
        // German entries are under 'de' key
        const entries = json['de'] || json['en'] || [];
        const defs = [];
        for (const entry of entries.slice(0, 2)) {
          const d = entry.definitions?.[0]?.definition;
          if (d) defs.push(d.replace(/<[^>]*>/g,'').trim().substring(0, 60));
        }
        if (meaning && defs.length) meaning.textContent = defs.join(' · ');
        else if (meaning) meaning.textContent = '';
      })
      .catch(() => { if (meaning) meaning.textContent = ''; });
  }
}

function closeCtxMenu() {
  const m = document.getElementById('wordCtxMenu');
  if (m) m.style.display = 'none';
}

// Close on any outside click or scroll
document.addEventListener('click',  e => { const m=document.getElementById('wordCtxMenu'); if(m&&!m.contains(e.target))closeCtxMenu(); });
document.addEventListener('scroll', () => closeCtxMenu(), true);

/** Save the right-clicked / selected word to vocab */
function ctxSaveWord() {
  closeCtxMenu();
  if (!_ctxWord) return;
  const item  = (_ctxCardIdx >= 0) ? S.newsItems[_ctxCardIdx] : null;
  let vocab   = loadVocab();
  const exists = vocab.find(v => v.word.toLowerCase() === _ctxWord.toLowerCase());
  if (exists) { showToast(`"${_ctxWord}" is already saved`); return; }
  const entry = {
    word:    _ctxWord,
    meaning: '',
    example: item ? item.title.substring(0, 70) : '',
    source:  item?.source || 'Manual',
    level:   S.lv,
    added:   new Date().toISOString(),
  };
  vocab.unshift(entry);
  if (vocab.length > 500) vocab = vocab.slice(0, 500);
  saveVocabList(vocab);
  showToast(`⭐ Saved "${_ctxWord}" — loading grammar…`);
  const badge = document.getElementById('vocabBankCount');
  if (badge) badge.textContent = vocab.length;
  autoEnrichWord(0); // enriches index 0 (just inserted)
}

      generateExamSet().then(() => {
        // Cache the exercises
        ES._preloaded = ES._preloaded || {};
        ES._preloaded['Grammatik'] = { exercises: ES.exercises.slice(), readText: ES._readText };
        ES.section = savedSection; // restore
      }).catch(() => {});
    }
  }, 3000);
}

init();
</script>
