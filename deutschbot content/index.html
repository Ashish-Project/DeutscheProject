<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeutschBot — AI German Learning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!--
  DEUTSCHBOT v7
  ═══════════════════════════════════════════════════════════════
  Section tags (Ctrl+F to jump):
    [CONFIG]      Feeds, providers, modes, levels — edit here
    [CACHE]       Background prefetch & cache engine
    [STATE]       Runtime state object
    [API]         AI call gateway — swap providers here
    [FEED]        RSS loader with 3-proxy fallback chain
    [NEWS-UI]     News card slider
    [CHAT-UI]     Chat bubble rendering
    [VOCAB-UI]    Saved vocabulary bank + flashcard practice
    [GAME-UI]     Games placeholder
    [MODE]        Mode / level switching
    [SEND]        Send + smart intent detection
    [DRAWER]      Settings drawer
    [INIT]        App startup
  ═══════════════════════════════════════════════════════════════
-->

<style>
/* ════════════════════════════════════════════════════════
   DESIGN TOKENS — change look here, nowhere else
   ════════════════════════════════════════════════════════ */
:root {
  /* ── Soft dark theme — easy on eyes, professional look ── */
  --bg:       #1a1f2e;   /* soft dark navy — not harsh black */
  --bg2:      #1e2538;   /* topbar / sidebar */
  --surface:  #252d42;   /* card surfaces */
  --surface2: #2c3554;   /* secondary surfaces */
  --surface3: #334068;   /* hover states */
  --border:   #3a4a6b;   /* subtle dividers */
  --border2:  #4a5c82;   /* stronger borders */

  /* Text hierarchy — high contrast, readable */
  --text:     #f0f4fa;   /* near-white — main text */
  --text2:    #b0c4de;   /* secondary text */
  --text3:    #6e89aa;   /* muted / labels */

  /* Accent palette */
  --gold:     #f0c060;   /* warm amber */
  --gold2:    #f8d880;
  --golddim:  rgba(240,192,96,0.14);
  --goldglow: rgba(240,192,96,0.22);
  --green:    #4ade80;
  --greendim: rgba(74,222,128,0.13);
  --red:      #f87171;
  --reddim:   rgba(248,113,113,0.13);
  --blue:     #60a5fa;   /* soft blue — primary interactive */
  --bluedim:  rgba(96,165,250,0.13);
  --blue2:    #3b82f6;
  --purple:   #c084fc;
  --teal:     #2dd4bf;

  /* Light-blue subbox tokens (news cards, lesson blocks) */
  --lb:        rgba(37,65,148,0.40);
  --lb2:       rgba(45,78,175,0.28);
  --lb-border: rgba(96,165,250,0.25);
  --lb-text:   #93c5fd;
  --lb-title:  #60a5fa;

  /* Typography */
  --fd: 'Fraunces', Georgia, serif;
  --fu: 'DM Sans', system-ui, sans-serif;
  --fm: 'JetBrains Mono', monospace;

  /* Spacing & radii */
  --r:    10px;
  --r2:   16px;
  --r3:   22px;
  --ease: cubic-bezier(.4,0,.2,1);
  --sh:   0 4px 28px rgba(0,0,0,.45);
}

*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; overflow:hidden; }
body {
  background:var(--bg); color:var(--text);
  font-family:var(--fu); font-size:16px; line-height:1.55;
  display:flex; flex-direction:column;
}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--blue)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.9}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.spinner{width:26px;height:26px;border:2.5px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .75s linear infinite}

/* ── TOPBAR ── */
.topbar{
  display:flex;align-items:center;gap:12px;padding:10px 20px;
  background:var(--bg2);border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:50;position:relative;
  box-shadow:0 1px 0 var(--border), 0 2px 12px rgba(0,0,0,.06);
}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-badge{
  width:36px;height:36px;border-radius:9px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  display:grid;place-items:center;
  font-family:var(--fd);font-size:19px;font-weight:700;color:#0f0e13;
  box-shadow:0 3px 14px rgba(232,184,75,.35);position:relative;
}
.logo-badge::after{content:'';position:absolute;inset:0;border-radius:9px;background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,transparent 55%)}
.logo-name{font-family:var(--fd);font-size:17px;font-weight:600;color:var(--text);display:block;letter-spacing:-.3px}
.logo-sub{font-size:9px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;display:block}
.topbar-sep{width:1px;height:26px;background:var(--border);flex-shrink:0}

/* Level pills */
.level-nav{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:3px}
.lvl{
  padding:4px 12px;border-radius:999px;border:none;
  font-family:var(--fm);font-size:10.5px;font-weight:500;
  color:var(--text3);background:transparent;cursor:pointer;
  transition:all .2s var(--ease);
}
.lvl:hover{color:var(--text);background:var(--surface2)}
.lvl.on{background:var(--gold);color:#0f0e13;font-weight:700;box-shadow:0 2px 10px rgba(232,184,75,.4)}

.topbar-right{display:flex;align-items:center;gap:7px;margin-left:auto}
.key-dot-wrap{
  width:30px;height:30px;border-radius:50%;
  background:var(--surface);border:1px solid var(--border);
  display:grid;place-items:center;cursor:pointer;transition:all .18s;
}
.key-dot-wrap:hover{border-color:var(--gold);background:var(--golddim)}
.key-btn{
  display:flex;align-items:center;gap:7px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:7px 13px;cursor:pointer;transition:all .18s;
}
.key-btn:hover{border-color:var(--gold);background:var(--golddim)}
.key-dot{width:7px;height:7px;border-radius:50%;background:var(--red);transition:all .4s;flex-shrink:0}
.key-dot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.key-label{font-size:11px;color:var(--text2);white-space:nowrap}
.icon-btn{
  width:34px;height:34px;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;display:grid;place-items:center;cursor:pointer;
  font-size:14px;transition:all .18s;color:var(--text2);
}
.icon-btn:hover{border-color:var(--gold);background:var(--golddim);color:var(--gold)}

/* Progress strip */
.prog-strip{height:2px;background:var(--border);flex-shrink:0}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width 1.2s var(--ease);position:relative}
.prog-fill::after{content:'';position:absolute;right:0;top:-2px;width:5px;height:5px;border-radius:50%;background:var(--gold2);box-shadow:0 0 7px var(--gold2)}

/* ── LAYOUT ── */
.app{flex:1;display:flex;overflow:hidden;min-height:0;position:relative;z-index:1}

/* ── SIDEBAR ── */
.sidebar{
  width:220px;min-width:220px;flex-shrink:0;
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:12px 8px;gap:2px;overflow-y:auto;
}
.sidebar-label{
  font-size:9px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--text3);padding:8px 10px 4px;
  display:flex;align-items:center;gap:6px;
}
.sidebar-label::after{content:'';flex:1;height:1px;background:var(--border)}
.mcard{
  border-radius:var(--r);border:1px solid transparent;
  padding:9px 11px;cursor:pointer;
  display:flex;align-items:center;gap:9px;
  transition:all .18s var(--ease);position:relative;
}
.mcard::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--mc,var(--gold));border-radius:3px 0 0 3px;
  opacity:0;transition:opacity .18s;
}
.mcard:hover{background:var(--surface);border-color:var(--border)}
.mcard:hover::before{opacity:.6}
.mcard.on{background:var(--surface);border-color:var(--border2)}
.mcard.on::before{opacity:1}
.mcard-icon{font-size:17px;flex-shrink:0}
.mcard-text{flex:1;min-width:0}
.mcard-name{font-size:12px;font-weight:500;color:var(--text);display:block}
.mcard-desc{font-size:10px;color:var(--text3);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* Background fetch indicator — small dot on sidebar card */
.mcard-status{width:5px;height:5px;border-radius:50%;background:var(--border2);flex-shrink:0;transition:all .4s}
.mcard-status.loading{background:var(--amber);animation:pulse 1.2s infinite}
.mcard-status.ready{background:var(--green)}

.sidebar-stats{
  margin-top:auto;border-top:1px solid var(--border);
  padding:10px 8px 0;display:flex;flex-direction:column;gap:4px;
}
.sstat{display:flex;justify-content:space-between;align-items:center;padding:2px 2px}
.sstat-label{font-size:10px;color:var(--text3)}
.sstat-val{font-family:var(--fm);font-size:10.5px;color:var(--gold)}

/* ── MAIN COLUMN ── */
.main-col{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;min-height:0}

/* Mode bar */
.mode-bar{
  padding:9px 20px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;
}
.mode-icon-lg{font-size:20px;flex-shrink:0}
.mode-title{font-size:13.5px;font-weight:600;color:var(--text);display:block;font-family:var(--fd)}
.mode-subtitle{font-size:10.5px;color:var(--text3);display:block;margin-top:1px}
.mode-bar-right{margin-left:auto}

/* Sub-mode pills */
.subbar{
  padding:6px 20px;
  background:rgba(20,18,25,.8);border-bottom:1px solid var(--border);
  display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0;
}
.subbtn{
  padding:3px 11px;border-radius:999px;
  border:1px solid var(--border);background:transparent;
  font-family:var(--fu);font-size:10.5px;color:var(--text3);
  cursor:pointer;transition:all .15s;
}
.subbtn:hover{color:var(--text);border-color:var(--border2)}
.subbtn.on{background:var(--surface2);color:var(--text);border-color:var(--border2)}

/* ── CHAT ── */
.chat-win{
  flex:1;overflow-y:auto;padding:22px 22px 12px;
  display:flex;flex-direction:column;gap:12px;
  scroll-behavior:smooth;min-height:0;
}

/* Welcome */
.home{
  margin:auto;display:flex;flex-direction:column;align-items:center;
  text-align:center;padding:28px 20px;max-width:580px;
  animation:fadeUp .5s var(--ease);
}
.home-emblem{
  width:76px;height:76px;
  background:linear-gradient(135deg,var(--surface2),var(--surface3));
  border:1px solid var(--border2);border-radius:20px;
  display:grid;place-items:center;font-size:38px;
  margin-bottom:20px;box-shadow:var(--sh);
  animation:float 5s ease-in-out infinite;
}
.home-title{font-family:var(--fd);font-size:34px;font-weight:600;color:var(--text);letter-spacing:-1px;line-height:1.1;margin-bottom:7px}
.home-title em{color:var(--gold);font-style:normal}
.home-sub{font-size:13.5px;color:var(--text2);line-height:1.8;margin-bottom:26px;max-width:420px}
.home-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;width:100%;margin-bottom:22px}
.hcard{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:14px 12px;text-align:left;
  cursor:pointer;transition:all .2s var(--ease);
  animation:fadeUp .5s var(--ease) both;
}
.hcard:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 6px 24px rgba(232,184,75,.1)}
.hcard:nth-child(1){animation-delay:.05s}.hcard:nth-child(2){animation-delay:.10s}
.hcard:nth-child(3){animation-delay:.15s}.hcard:nth-child(4){animation-delay:.20s}
.hcard:nth-child(5){animation-delay:.25s}.hcard:nth-child(6){animation-delay:.30s}
.hcard-icon{font-size:22px;margin-bottom:8px;display:block}
.hcard-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px}
.hcard-desc{font-size:10px;color:var(--text3);line-height:1.5}
.begin-btn{
  padding:12px 34px;background:linear-gradient(135deg,var(--gold),var(--gold2));
  border:none;border-radius:var(--r);
  font-family:var(--fd);font-size:14.5px;font-weight:600;color:#0f0e13;
  cursor:pointer;box-shadow:0 5px 24px rgba(232,184,75,.38);transition:all .2s;
}
.begin-btn:hover{transform:translateY(-2px);box-shadow:0 9px 32px rgba(232,184,75,.5)}

/* Chat messages */
.msg{display:flex;gap:9px;max-width:820px;animation:fadeUp .24s var(--ease)}
.msg.user{align-self:flex-end;flex-direction:row-reverse;max-width:620px}
.avatar{
  width:30px;height:30px;border-radius:8px;
  display:grid;place-items:center;font-size:14px;
  flex-shrink:0;margin-top:3px;
  border:1px solid var(--border);background:var(--surface2);
}
.msg.bot .avatar{background:linear-gradient(135deg,rgba(232,184,75,.15),rgba(232,184,75,.05));border-color:rgba(232,184,75,.2)}
.bubble{padding:12px 16px;border-radius:13px;font-size:15px;line-height:1.85}
.msg.bot .bubble{background:var(--lb);border:1px solid var(--lb-border);border-top-left-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.msg.user .bubble{background:var(--surface2);border:1px solid var(--border2);border-top-right-radius:4px}
.bubble strong{color:var(--gold);font-weight:600}
.bubble .vocab{color:var(--gold2);background:rgba(232,184,75,.1);padding:1px 5px;border-radius:4px;font-weight:600}
.bubble .correct{display:block;margin-top:8px;padding:8px 12px;background:var(--greendim);border-left:3px solid var(--green);border-radius:0 7px 7px 0;font-size:12.5px;color:#7de0aa}
.bubble .choice{display:block;padding:3px 0;color:var(--gold2)}

/* Typing */
.typing{display:flex;gap:9px;animation:fadeUp .24s var(--ease)}
.typing-bub{background:var(--surface);border:1px solid var(--border);border-radius:13px;border-top-left-radius:4px;padding:12px 16px;display:flex;gap:4px;align-items:center}
.dot{width:5px;height:5px;border-radius:50%;background:var(--text3);animation:pulse 1.3s infinite}
.dot:nth-child(2){animation-delay:.18s}.dot:nth-child(3){animation-delay:.36s}

/* Quick chips */
.chips-row{padding:7px 20px;border-top:1px solid var(--border);background:var(--bg2);display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0}
.chip{
  padding:4px 12px;border-radius:999px;
  border:1px solid var(--border);background:var(--surface);
  font-size:10.5px;color:var(--text3);cursor:pointer;transition:all .14s;
}
.chip:hover{border-color:var(--gold);color:var(--text);background:var(--golddim)}

/* Input */
.input-zone{padding:10px 20px 13px;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0}
.input-row{display:flex;gap:7px;align-items:flex-end}
.input-shell{
  flex:1;background:var(--surface);border:1.5px solid var(--border);
  border-radius:13px;display:flex;align-items:flex-end;
  padding:4px 4px 4px 14px;transition:border-color .2s,box-shadow .2s;
}
.input-shell:focus-within{border-color:rgba(232,184,75,.5);box-shadow:0 0 0 3px rgba(232,184,75,.06)}
#msgInput{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-family:var(--fu);font-size:14px;
  resize:none;line-height:1.65;padding:8px 0;max-height:120px;overflow-y:auto;
}
#msgInput::placeholder{color:var(--text3)}
.send-btn{
  width:40px;height:40px;background:var(--gold);border:none;border-radius:10px;
  color:#0f0e13;cursor:pointer;display:grid;place-items:center;
  transition:all .18s;flex-shrink:0;box-shadow:0 3px 12px rgba(232,184,75,.32);
}
.send-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 5px 18px rgba(232,184,75,.46)}
.send-btn:disabled{opacity:.25;cursor:not-allowed;transform:none}

/* ════════════════════════════════════════════════════════
   NEWS PANEL — dark theme, light-blue subboxes
   ════════════════════════════════════════════════════════ */
.news-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;background:var(--bg)}

.news-topbar{
  padding:9px 20px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;
  box-shadow:0 1px 8px rgba(0,0,0,.3);
}
.news-topbar-title{font-family:var(--fd);font-size:15px;font-weight:600;color:var(--text)}
.news-topbar-sub{font-size:11px;color:var(--text3)}
.refresh-btn{
  margin-left:auto;display:flex;align-items:center;gap:5px;
  padding:5px 13px;background:var(--surface2);border:1px solid var(--border);
  border-radius:999px;font-size:10.5px;color:var(--text2);cursor:pointer;transition:all .18s;
}
.refresh-btn:hover{background:var(--lb);border-color:var(--lb-border);color:var(--lb-text)}
.refresh-btn.busy svg{animation:spin .8s linear infinite}

.feed-pills{
  padding:7px 20px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0;
}
.feed-pill{
  padding:3px 12px;border-radius:999px;border:1px solid var(--border);
  background:transparent;font-size:10.5px;color:var(--text3);cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:4px;
}
.feed-pill:hover{color:var(--lb-text);border-color:var(--lb-border)}
.feed-pill.on{background:var(--lb);color:var(--lb-text);border-color:var(--lb-border)}
.feed-lang{font-family:var(--fm);font-size:9px;opacity:.6}

/* Card area */
.news-body{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0;position:relative}
.news-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text3);text-align:center;padding:36px}
.news-state p{font-size:13.5px;line-height:1.7;max-width:320px}

/* Swipeable card */
.news-card{display:none;flex-direction:column;flex:1;min-height:0;overflow:hidden;animation:fadeIn .28s var(--ease);touch-action:pan-y}
.news-card.active{display:flex}

/* Article scroll area */
.nc-article{flex:1;overflow-y:auto;padding:0;min-height:0}

/* Card inner — light-blue subbox */
.nc-card-inner{
  margin:14px 16px;
  background:var(--lb);border-radius:16px;
  border:1px solid var(--lb-border);
  box-shadow:0 2px 20px rgba(0,0,0,.3);
  overflow:hidden;
}

/* Meta row */
.nc-meta{display:flex;align-items:center;gap:7px;padding:12px 16px 0;flex-wrap:wrap}
.nc-badge{font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:3px 9px;border-radius:999px;font-family:var(--fm)}
.nc-badge.source{background:rgba(91,158,245,.15);color:var(--blue);border:1px solid rgba(91,158,245,.25)}
.nc-badge.topic{background:rgba(168,126,245,.15);color:var(--purple);border:1px solid rgba(168,126,245,.25)}
.nc-badge.lang{background:rgba(62,207,122,.12);color:var(--green);border:1px solid rgba(62,207,122,.2)}
.nc-time{font-size:10px;color:var(--text3);margin-left:auto;font-family:var(--fm)}

/* Headline area */
.nc-headline-wrap{padding:10px 16px 0}
.nc-headline{font-family:var(--fd);font-size:20px;font-weight:700;color:var(--text);line-height:1.28;margin-bottom:4px}
.nc-headline-en{font-size:12px;color:var(--text3);font-style:italic;margin-bottom:8px;display:none}

/* Side-by-side summary */
.nc-summary-row{display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:1px solid var(--lb-border);margin-top:10px}
.nc-sum-block{padding:14px 16px}
.nc-sum-block.de{background:rgba(30,58,95,.6);border-right:1px solid var(--lb-border)}
.nc-sum-block.en{background:rgba(20,28,48,.5)}
.nc-sum-label{font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.nc-sum-block.de .nc-sum-label{color:var(--lb-text)}
.nc-sum-block.en .nc-sum-label{color:var(--gold)}
.nc-sum-text{font-size:14px;line-height:1.82;color:var(--text)}
.nc-sum-text.en-text{color:var(--text2);font-size:13px}

/* Loading state */
.nc-headline-de{padding:12px 16px;font-size:13px;color:var(--text3);font-style:italic;animation:pulse 1.5s infinite}
.nc-headline-de.loading{animation:pulse 1.5s infinite}

/* Mobile: stack */
@media(max-width:640px){.nc-summary-row{grid-template-columns:1fr}.nc-sum-block.de{border-right:none;border-bottom:1px solid var(--lb-border)}}

/* Article link */
.nc-link-row{padding:6px 16px 10px;display:flex;align-items:center;gap:8px}
.nc-link{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--blue);text-decoration:none;transition:color .18s}
.nc-link:hover{color:var(--gold)}

/* Lesson block */
.nc-lesson{margin:0;border-top:1px solid var(--lb-border);padding:14px 16px 16px;background:rgba(14,17,23,.5)}
.nc-lesson-title{font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--lb-text);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.nc-lesson-title::after{content:'';flex:1;height:1.5px;background:var(--lb-border)}

/* Two-column lesson grid */
.nc-lesson-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:700px){.nc-lesson-grid{grid-template-columns:1fr}}

.nc-lesson-block{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:12px 13px}
.nc-lesson-block-title{font-size:9.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;gap:5px}
.nc-lesson-block-title.vocab-title{color:var(--gold)}
.nc-lesson-block-title.grammar-title{color:var(--purple)}
.nc-lesson-block-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* Vocab entries in lesson */
.vocab-list{display:flex;flex-direction:column;gap:6px}
.vocab-entry{padding:8px 10px;border-radius:8px;background:var(--lb);border:1px solid var(--lb-border);position:relative}
.vocab-type{font-size:8.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--purple);margin-bottom:2px}
.vocab-word{font-family:var(--fm);font-size:12.5px;font-weight:700;color:var(--lb-text);margin-bottom:1px}
.vocab-forms{font-size:10.5px;color:var(--text3);font-family:var(--fm);margin-bottom:2px}
.vocab-meaning{font-size:12px;color:var(--text2)}
.vocab-example{font-size:11px;color:var(--text3);font-style:italic;margin-top:3px}
.vocab-save-btn{position:absolute;right:7px;top:7px;width:20px;height:20px;border-radius:5px;background:transparent;border:1px solid var(--border);display:grid;place-items:center;cursor:pointer;font-size:10px;color:var(--text3);transition:all .18s}
.vocab-save-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--golddim)}
.vocab-save-btn.saved{border-color:var(--green);color:var(--green);background:var(--greendim)}

/* Grammar entries */
.grammar-list{display:flex;flex-direction:column;gap:7px}
.grammar-entry{padding:9px 11px;border-radius:8px;background:var(--lb);border:1px solid var(--lb-border)}
.grammar-rule{font-size:12px;font-weight:700;color:var(--purple);margin-bottom:4px}
.grammar-explanation{font-size:12px;color:var(--text2);line-height:1.75}

/* Practice + Questions */
.nc-sub-title{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin:12px 0 7px;display:flex;align-items:center;gap:5px}
.nc-sub-title::after{content:'';flex:1;height:1px;background:var(--border)}
.nc-sentences{display:flex;flex-direction:column;gap:5px}
.nc-sent{display:flex;gap:9px;align-items:flex-start;padding:8px 10px;background:var(--lb);border-radius:8px;border:1px solid var(--lb-border)}
.nc-sent-num{font-family:var(--fm);font-size:10px;color:var(--text3);padding-top:2px;flex-shrink:0;min-width:14px}
.nc-sent-text{font-size:13.5px;color:var(--text);line-height:1.75}
.nc-questions{display:flex;flex-direction:column;gap:5px}
.nc-q{font-size:13.5px;color:var(--text2);padding:8px 12px;background:var(--lb);border-radius:8px;border-left:3px solid var(--blue)}

/* Bottom chat bar */
.nc-chat{flex-shrink:0;background:var(--bg2);border-top:1px solid var(--border);padding:10px 16px 12px;display:flex;flex-direction:column;gap:7px}
.nc-chat-label{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--lb-text);flex-shrink:0;display:flex;align-items:center;gap:6px}
.nc-chat-label::before{content:'💬';font-size:12px}
.nc-chat-msgs{max-height:160px;overflow-y:auto;display:flex;flex-direction:column;gap:5px}
.nc-chat-msgs:empty{display:none}
.nc-msg{font-size:13px;line-height:1.65;padding:8px 12px;border-radius:10px;max-width:88%}
.nc-msg.bot{background:var(--lb);border:1px solid var(--lb-border);color:var(--text);align-self:flex-start;border-bottom-left-radius:3px}
.nc-msg.user{background:var(--blue);color:#fff;align-self:flex-end;border-bottom-right-radius:3px}
.nc-input-row{display:flex;gap:7px;flex-shrink:0}
.nc-input{flex:1;background:var(--surface);border:1.5px solid var(--border2);border-radius:10px;padding:9px 13px;color:var(--text);font-family:var(--fu);font-size:13.5px;outline:none;transition:border-color .2s}
.nc-input:focus{border-color:var(--lb-border);background:var(--lb)}
.nc-input::placeholder{color:var(--text3)}
.nc-send-btn{padding:9px 16px;background:var(--blue);border:none;border-radius:10px;color:#fff;font-weight:700;font-size:12.5px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:5px}
.nc-send-btn:hover{background:#4080d0;transform:translateY(-1px)}

/* Nav bar */
.slider-nav-bar{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:10px;padding:9px 20px;background:var(--bg2);border-top:1px solid var(--border)}
.nav-btn{width:36px;height:36px;border-radius:9px;background:var(--lb);border:1px solid var(--lb-border);display:grid;place-items:center;cursor:pointer;color:var(--lb-text);font-size:14px;transition:all .18s}
.nav-btn:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.nav-btn:disabled{opacity:.25;cursor:not-allowed}
.nav-dots{display:flex;gap:4px;align-items:center}
.nav-dot{width:5px;height:5px;border-radius:50%;background:var(--border2);cursor:pointer;transition:all .2s}
.nav-dot.on{background:var(--blue);width:16px;border-radius:999px}
.nav-counter{font-family:var(--fm);font-size:11px;color:var(--text3);min-width:48px;text-align:center}

/* ════════════════════════════════════════════════════════
   VOCABULARY BANK TAB
   ════════════════════════════════════════════════════════ */
.vocab-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.vocab-topbar{
  padding:9px 20px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;
}
.vocab-panel-title{font-family:var(--fd);font-size:14px;font-weight:600;color:var(--text)}
.vocab-count-badge{
  background:var(--golddim);color:var(--gold);border:1px solid rgba(232,184,75,.2);
  border-radius:999px;font-size:10px;font-family:var(--fm);padding:2px 9px;
}
.vocab-tabs{
  display:flex;gap:0;flex-shrink:0;
  border-bottom:1px solid var(--border);background:var(--bg2);
}
.vocab-tab{
  padding:8px 18px;font-size:11.5px;font-weight:500;color:var(--text3);
  cursor:pointer;border-bottom:2px solid transparent;transition:all .18s;
}
.vocab-tab:hover{color:var(--text)}
.vocab-tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.vocab-body{flex:1;overflow-y:auto;padding:16px 18px;min-height:0}

/* Vocab bank cards — enriched layout */
.vocab-bank{display:flex;flex-direction:column;gap:10px}
.vbank-card{
  background:var(--lb);border:1px solid var(--lb-border);
  border-radius:var(--r);padding:14px 16px;
  transition:border-color .18s;
}
.vbank-card:hover{border-color:var(--blue)}
.vbank-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;gap:8px}
.vbank-word-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;flex:1}
.vbank-word{font-family:var(--fm);font-size:15px;font-weight:700;color:var(--gold)}
.vbank-type-badge{font-size:9px;padding:2px 7px;border-radius:999px;background:var(--bluedim);color:var(--blue);border:1px solid rgba(91,158,245,.25);font-family:var(--fm);text-transform:uppercase;letter-spacing:.06em}
.vbank-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap}
.vbank-dict-link{font-size:10.5px;color:var(--lb-text);text-decoration:none;padding:3px 9px;border:1px solid var(--lb-border);border-radius:6px;transition:all .15s;white-space:nowrap}
.vbank-dict-link:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.vbank-meaning{font-size:13.5px;color:var(--text);margin-bottom:7px;line-height:1.55}
.vbank-grammar-block{margin:8px 0;padding:9px 11px;background:var(--surface2);border-radius:8px;border-left:3px solid var(--blue)}
.vbank-grammar-title{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--lb-text);margin-bottom:5px}
.vbank-forms{font-size:12.5px;color:var(--text2);line-height:1.75;font-family:var(--fm)}
.vbank-conj{font-size:12px;color:var(--text2);line-height:1.7}
.conj-table{display:flex;flex-direction:column;gap:3px}
.conj-row{display:flex;gap:10px;align-items:baseline}
.conj-label{font-size:9.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;min-width:64px;flex-shrink:0}
.conj-val{font-size:12.5px;color:var(--text2);font-family:var(--fm)}
.vbank-example{font-size:12.5px;color:var(--text3);font-style:italic;margin:6px 0;line-height:1.65;padding-left:10px;border-left:2px solid var(--lb-border)}
.vbank-footer{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:8px}
.vbank-tag{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 7px;font-size:9.5px;color:var(--text3)}
.vbank-enrich-btn{margin-left:auto;padding:5px 13px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:6px;color:#0e1117;font-size:10.5px;font-weight:700;cursor:pointer;transition:all .18s;white-space:nowrap}
.vbank-enrich-btn:hover{transform:translateY(-1px);box-shadow:0 3px 12px rgba(232,184,75,.35)}
.vbank-enrich-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* New vocab card sections */
.vbank-context-block{margin:7px 0;padding:9px 11px;border-radius:8px;background:var(--surface2);border-left:3px solid var(--gold)}
.vbank-synonyms-block{margin:7px 0}
.vbank-word-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.vbank-chip{padding:3px 10px;border-radius:999px;font-size:11.5px;cursor:pointer;transition:all .15s;font-family:var(--fm)}

/* Match test cards */
.match-card{
  padding:12px 14px;border-radius:var(--r);margin-bottom:7px;
  background:var(--surface2);border:2px solid var(--border2);
  font-size:14px;color:var(--text);transition:all .18s;
  user-select:none;
}
.match-card:hover:not(.matched){border-color:var(--blue);background:var(--lb)}
.match-card.selected{border-color:var(--gold);background:var(--golddim);color:var(--gold)}
.match-card.matched{border-color:var(--green);background:var(--greendim);color:var(--green);opacity:.7;cursor:default}
@keyframes wrongFlash{0%,100%{background:var(--surface2)}50%{background:var(--reddim);border-color:var(--red)}}
.match-card.wrong-flash{animation:wrongFlash .6s ease;border-color:var(--red)}
.vbank-chip.synonym{background:var(--greendim);color:var(--green);border:1px solid rgba(62,207,122,.25)}
.vbank-chip.synonym:hover{background:var(--green);color:#0e1117}
.vbank-chip.antonym{background:rgba(224,90,106,.1);color:var(--red);border:1px solid rgba(224,90,106,.25)}
.vbank-chip.antonym:hover{background:var(--red);color:#fff}
.vbank-del{width:26px;height:26px;border-radius:6px;flex-shrink:0;background:transparent;border:1px solid var(--border);display:grid;place-items:center;cursor:pointer;font-size:11px;color:var(--text3);transition:all .18s}
.vbank-del:hover{border-color:var(--red);color:var(--red);background:rgba(224,90,106,.1)}

/* Vocab flashcard practice */
.flashcard-wrap{display:flex;flex-direction:column;align-items:center;padding:30px 20px;gap:18px}
.flashcard{
  width:100%;max-width:480px;min-height:200px;
  background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:28px;text-align:center;cursor:pointer;
  transition:all .25s var(--ease);box-shadow:var(--sh);
  position:relative;
}
.flashcard:hover{border-color:var(--gold);box-shadow:0 8px 40px rgba(232,184,75,.12)}
.flashcard-word{font-family:var(--fm);font-size:26px;font-weight:600;color:var(--gold2);margin-bottom:8px}
.flashcard-hint{font-size:11px;color:var(--text3)}
.flashcard-answer{font-size:15px;color:var(--text);margin-top:14px;line-height:1.6;animation:fadeIn .3s var(--ease)}
.fc-btns{display:flex;gap:10px}
.fc-btn{
  padding:10px 28px;border:none;border-radius:var(--r);
  font-family:var(--fu);font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;
}
.fc-btn.wrong{background:rgba(224,90,106,.15);color:var(--red);border:1px solid rgba(224,90,106,.3)}
.fc-btn.right{background:var(--greendim);color:var(--green);border:1px solid rgba(66,201,126,.3)}
.fc-btn:hover{transform:translateY(-1px)}
.fc-score{font-family:var(--fm);font-size:13px;color:var(--text3)}
.vocab-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:10px;color:var(--text3);text-align:center;padding:40px;
}
.vocab-empty-icon{font-size:40px;margin-bottom:6px}
.vocab-empty p{font-size:13px;line-height:1.7;max-width:300px}

/* ════════════════════════════════════════════════════════
   EXAM PANEL
   ════════════════════════════════════════════════════════ */
.exam-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;background:var(--bg)}
.exam-topbar{padding:9px 20px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.exam-title{font-family:var(--fd);font-size:15px;font-weight:600;color:var(--text)}
.exam-level-badge{padding:3px 11px;border-radius:999px;background:var(--golddim);color:var(--gold);border:1px solid rgba(232,184,75,.25);font-size:11px;font-family:var(--fm);font-weight:700}
.exam-tabs{display:flex;gap:0;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--bg2);overflow-x:auto}
.exam-tab{padding:9px 16px;font-size:11.5px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .18s;white-space:nowrap;flex-shrink:0}
.exam-tab:hover{color:var(--text)}
.exam-tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.exam-body{flex:1;overflow-y:auto;padding:20px;min-height:0}

/* Exercise card */
.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:20px;margin-bottom:16px;max-width:760px}
.ex-card h3{font-family:var(--fd);font-size:17px;font-weight:600;color:var(--text);margin-bottom:6px}
.ex-card .ex-meta{font-size:11px;color:var(--text3);margin-bottom:14px;font-family:var(--fm)}
.ex-text{font-size:15px;color:var(--text2);line-height:1.9;background:var(--lb);border:1px solid var(--lb-border);border-radius:var(--r);padding:14px 16px;margin-bottom:16px}
.ex-question{font-size:14.5px;color:var(--text);font-weight:500;margin-bottom:10px;margin-top:14px}

/* Multiple choice */
.ex-options{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.ex-option{
  display:flex;align-items:center;gap:11px;
  padding:11px 14px;border-radius:var(--r);
  border:1.5px solid var(--border2);background:var(--surface2);
  cursor:pointer;transition:all .18s;font-size:14px;color:var(--text);
}
.ex-option:hover{border-color:var(--blue);background:var(--lb)}
.ex-option.selected{border-color:var(--gold);background:var(--golddim);color:var(--gold)}
.ex-option.correct{border-color:var(--green);background:var(--greendim);color:var(--green)}
.ex-option.wrong{border-color:var(--red);background:var(--reddim);color:var(--red)}
.ex-option-key{width:26px;height:26px;border-radius:50%;background:var(--surface3);display:grid;place-items:center;font-size:11px;font-family:var(--fm);font-weight:700;flex-shrink:0}

/* Text input exercises */
.ex-textarea{width:100%;min-height:120px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--r);padding:12px;color:var(--text);font-family:var(--fu);font-size:14px;line-height:1.75;outline:none;resize:vertical;transition:border-color .2s;margin-bottom:12px}
.ex-textarea:focus{border-color:var(--gold);background:var(--lb)}
.ex-textarea::placeholder{color:var(--text3)}

/* Gap fill */
.ex-gap-sentence{font-size:15px;color:var(--text);line-height:2.2;margin-bottom:14px}
.ex-gap{display:inline-block;border-bottom:2px solid var(--gold);min-width:80px;padding:0 4px;text-align:center;color:var(--gold);font-family:var(--fm)}
.ex-gap-input{background:transparent;border:none;border-bottom:2px solid var(--gold);outline:none;color:var(--gold);font-family:var(--fm);font-size:14px;width:100px;text-align:center;padding:2px 4px}
.ex-gap-input.correct{border-color:var(--green);color:var(--green)}
.ex-gap-input.wrong{border-color:var(--red);color:var(--red)}

/* Feedback block */
.ex-feedback{padding:12px 16px;border-radius:var(--r);margin-top:10px;font-size:14px;line-height:1.7;display:none}
.ex-feedback.show{display:block}
.ex-feedback.correct{background:var(--greendim);border:1px solid rgba(62,207,122,.25);color:#7eeea6}
.ex-feedback.wrong{background:var(--reddim);border:1px solid rgba(240,80,110,.25);color:#ff8fa0}
.ex-feedback.info{background:var(--lb);border:1px solid var(--lb-border);color:var(--text2)}

/* Action buttons */
.ex-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.btn-submit{padding:10px 26px;background:var(--gold);border:none;border-radius:var(--r);color:#0d1117;font-weight:700;font-size:13.5px;cursor:pointer;transition:all .18s}
.btn-submit:hover{background:var(--gold2);transform:translateY(-1px)}
.btn-next{padding:10px 26px;background:var(--blue);border:none;border-radius:var(--r);color:#fff;font-weight:700;font-size:13.5px;cursor:pointer;transition:all .18s;display:none}
.btn-next.show{display:block}
.btn-next:hover{background:#4080d0;transform:translateY(-1px)}
.btn-generate{padding:10px 24px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--r);color:var(--text2);font-size:13px;cursor:pointer;transition:all .18s}
.btn-generate:hover{border-color:var(--gold);color:var(--gold)}

/* Score display */
.ex-score-bar{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--lb);border:1px solid var(--lb-border);border-radius:var(--r);margin-bottom:14px}
.ex-score-num{font-family:var(--fm);font-size:18px;font-weight:700;color:var(--gold)}
.ex-score-label{font-size:12px;color:var(--text3)}

/* ════════════════════════════════════════════════════════
   GAMES PLACEHOLDER
   ════════════════════════════════════════════════════════ */
.game-placeholder{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:16px;padding:40px;text-align:center;
  background:var(--bg);
}
.game-placeholder-icon{font-size:64px;animation:float 4s ease-in-out infinite}
.game-placeholder h2{font-family:var(--fd);font-size:26px;font-weight:600;color:var(--text)}
.game-placeholder p{font-size:13.5px;color:var(--text2);line-height:1.75;max-width:380px}
.game-coming-soon{
  display:flex;align-items:center;gap:8px;
  padding:7px 18px;background:var(--surface);border:1px solid var(--border);
  border-radius:999px;font-size:11px;color:var(--text3);
}
.game-coming-soon::before{content:'🛠';font-size:13px}

/* ════════════════════════════════════════════════════════
   SETTINGS DRAWER
   ════════════════════════════════════════════════════════ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s var(--ease);backdrop-filter:blur(3px)}
.overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;top:0;right:-460px;bottom:0;width:440px;background:var(--bg2);border-left:1px solid var(--border);z-index:201;transition:right .36s var(--ease);display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(0,0,0,.12)}
.drawer.open{right:0}
.drawer-top{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.drawer-title{font-family:var(--fd);font-size:16px;font-weight:600;color:var(--text)}
.drawer-close{width:28px;height:28px;border-radius:7px;background:var(--surface);border:1px solid var(--border);display:grid;place-items:center;cursor:pointer;color:var(--text2);font-size:14px;transition:all .18s}
.drawer-close:hover{border-color:var(--red);color:var(--red)}
.drawer-body{flex:1;overflow-y:auto;padding:16px 20px}
.cfg-sec{margin-bottom:20px}
.cfg-title{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:9px;font-weight:700;display:flex;align-items:center;gap:6px}
.cfg-title::after{content:'';flex:1;height:1px;background:rgba(232,184,75,.18)}
.src-row{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:var(--r);background:var(--surface);border:1px solid var(--border);margin-bottom:4px;cursor:pointer;transition:all .18s}
.src-row:hover{border-color:var(--border2)}
.src-row.on{border-color:rgba(232,184,75,.45);background:var(--golddim)}
.src-chk{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border2);display:grid;place-items:center;font-size:10px;flex-shrink:0;transition:all .18s}
.src-row.on .src-chk{background:var(--gold);border-color:var(--gold);color:#0f0e13}
.src-name{font-size:11.5px;font-weight:500;color:var(--text);display:block}
.src-note{font-size:10px;color:var(--text3);display:block}
.src-lang-tag{font-size:9px;padding:2px 7px;border-radius:999px;background:var(--surface2);color:var(--text3);border:1px solid var(--border);font-family:var(--fm)}
.range-wrap{margin-bottom:12px}
.range-top{display:flex;justify-content:space-between;margin-bottom:6px;font-size:11px;color:var(--text2)}
.range-val{color:var(--gold);font-family:var(--fm);font-weight:600}
input[type=range]{width:100%;height:3px;background:var(--border);border-radius:999px;outline:none;-webkit-appearance:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--gold);border-radius:50%;cursor:pointer}
/* Key rows */
.key-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;margin-bottom:9px}
.key-row-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:7px}
.key-provider-name{font-size:12.5px;font-weight:600;color:var(--text);display:block}
.key-provider-modes{font-size:10px;color:var(--text3);display:block;margin-top:2px}
.key-indicator{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0;margin-top:3px;transition:all .3s}
.key-indicator.ok{background:var(--green);box-shadow:0 0 5px var(--green)}
.key-input-row{display:flex;gap:5px;align-items:center;margin-bottom:6px}
.key-field{flex:1;padding:7px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--fm);font-size:11px;outline:none;transition:border-color .2s}
.key-field:focus{border-color:rgba(232,184,75,.45)}
.key-field::placeholder{color:var(--text3)}
.btn-gold{padding:7px 13px;background:var(--gold);border:none;border-radius:7px;font-family:var(--fu);font-size:11px;font-weight:600;color:#0f0e13;cursor:pointer;transition:all .18s}
.btn-gold:hover{background:var(--gold2);transform:translateY(-1px)}
.key-clear-btn{width:28px;height:32px;flex-shrink:0;background:var(--surface2);border:1px solid var(--border);border-radius:6px;display:grid;place-items:center;cursor:pointer;font-size:11px;color:var(--text3);transition:all .18s}
.key-clear-btn:hover{border-color:var(--red);color:var(--red)}
.key-get-link{font-size:10px;color:var(--blue);text-decoration:none;display:inline-block;transition:color .18s}
.key-get-link:hover{color:var(--gold)}
.info-box{background:var(--golddim);border:1px solid rgba(232,184,75,.18);border-radius:var(--r);padding:11px 13px;font-size:11px;color:var(--text3);line-height:1.7;margin-top:7px}
.info-box strong{color:var(--gold)}
.apply-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:var(--r);font-family:var(--fd);font-size:13.5px;font-weight:600;color:#0f0e13;cursor:pointer;transition:all .18s;margin-top:7px}
.apply-btn:hover{transform:translateY(-1px)}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface2);border:1px solid var(--border2);border-radius:9px;padding:9px 18px;font-size:13px;color:var(--text);z-index:999;opacity:0;transition:all .28s var(--ease);pointer-events:none;box-shadow:var(--sh);white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── EXAM PANEL ── */
.exam-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;background:var(--bg)}
.exam-topbar{padding:10px 20px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.exam-title{font-family:var(--fd);font-size:15px;font-weight:600;color:var(--text)}
.exam-level-badge{background:var(--golddim);color:var(--gold);border:1px solid rgba(232,184,75,.25);border-radius:999px;font-family:var(--fm);font-size:10px;padding:2px 10px}
.exam-sections{padding:6px 16px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0}
.exam-sec-btn{padding:5px 13px;border-radius:7px;border:1px solid var(--border);background:transparent;font-size:11.5px;color:var(--text3);cursor:pointer;transition:all .15s}
.exam-sec-btn:hover{color:var(--text);border-color:var(--border2)}
.exam-sec-btn.on{background:var(--gold);color:#0e1117;border-color:var(--gold);font-weight:700}
.exam-body{flex:1;overflow-y:auto;padding:16px 18px;min-height:0}
.exam-card{background:var(--lb);border:1px solid var(--lb-border);border-radius:var(--r2);padding:18px 20px;margin-bottom:14px;max-width:760px}
.exam-card-title{font-family:var(--fd);font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px}
.exam-card-sub{font-size:11.5px;color:var(--text3);margin-bottom:14px}
.exam-text{font-size:14.5px;color:var(--text2);line-height:1.9;white-space:pre-wrap;background:var(--surface2);padding:14px 16px;border-radius:var(--r);margin-bottom:14px;border:1px solid var(--border)}
.exam-q{margin-bottom:14px}
.exam-q-text{font-size:14px;color:var(--text);font-weight:500;margin-bottom:8px}
.exam-options{display:flex;flex-direction:column;gap:6px}
.exam-opt{
  display:flex;align-items:center;gap:10px;padding:9px 13px;
  border-radius:8px;border:1.5px solid var(--border2);background:var(--surface2);
  cursor:pointer;transition:all .15s;font-size:13.5px;color:var(--text2);
}
.exam-opt:hover{border-color:var(--blue);color:var(--text);background:var(--lb)}
.exam-opt.selected{border-color:var(--blue);background:var(--bluedim);color:var(--text)}
.exam-opt.correct{border-color:var(--green);background:var(--greendim);color:var(--green)}
.exam-opt.wrong{border-color:var(--red);background:rgba(224,90,106,.1);color:var(--red)}
.exam-opt-letter{width:26px;height:26px;border-radius:50%;background:var(--border);display:grid;place-items:center;font-family:var(--fm);font-size:11px;font-weight:700;color:var(--text3);flex-shrink:0}
.exam-input-area{width:100%;background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--r);padding:11px 13px;color:var(--text);font-family:var(--fu);font-size:14px;outline:none;resize:vertical;min-height:100px;transition:border-color .2s}
.exam-input-area:focus{border-color:var(--lb-border)}
.exam-submit-btn{padding:10px 26px;background:var(--gold);border:none;border-radius:var(--r);color:#0e1117;font-family:var(--fd);font-size:14px;font-weight:700;cursor:pointer;transition:all .18s;margin-top:10px}
.exam-submit-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(232,184,75,.35)}
.exam-feedback{margin-top:12px;padding:12px 14px;border-radius:var(--r);font-size:13.5px;line-height:1.75}
.exam-feedback.correct{background:var(--greendim);border-left:3px solid var(--green);color:var(--green)}
.exam-feedback.partial{background:rgba(245,164,75,.1);border-left:3px solid var(--amber);color:var(--amber)}
.exam-feedback.wrong{background:rgba(224,90,106,.1);border-left:3px solid var(--red);color:var(--red)}
.exam-score-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);border-radius:var(--r);margin-bottom:14px}
.exam-score-label{font-size:11px;color:var(--text3);font-family:var(--fm)}
.exam-score-val{font-family:var(--fm);font-size:13px;font-weight:700;color:var(--gold)}
.exam-generate-btn{padding:8px 18px;background:var(--lb);border:1px solid var(--lb-border);border-radius:var(--r);color:var(--lb-text);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.exam-generate-btn:hover{background:var(--blue);color:#fff;border-color:var(--blue)}

/* ── CONTEXT MENU with translation ── */
.word-ctx-menu{position:fixed;z-index:9999;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);box-shadow:var(--sh);padding:6px 4px;min-width:220px;animation:fadeIn .14s var(--ease)}
.word-ctx-word{font-family:var(--fm);font-size:11px;font-weight:600;color:var(--text3);padding:5px 12px 4px;border-bottom:1px solid var(--border);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.word-ctx-translation{font-size:12.5px;color:var(--lb-text);padding:6px 12px 4px;border-bottom:1px solid var(--border);margin-bottom:3px;min-height:26px;line-height:1.5}
.word-ctx-item{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:7px;font-size:13px;color:var(--text2);cursor:pointer;transition:all .12s}
.word-ctx-item:hover{background:var(--lb);color:var(--lb-text)}
.ctx-icon{font-size:14px;flex-shrink:0}

/* ── VOCAB MATCHING TEST ── */
.match-panel{padding:20px;max-width:680px;margin:0 auto}
.match-title{font-family:var(--fd);font-size:20px;font-weight:600;color:var(--text);margin-bottom:4px}
.match-sub{font-size:12.5px;color:var(--text3);margin-bottom:18px}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.match-col-label{font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);padding:0 4px;margin-bottom:6px}
.match-items{display:flex;flex-direction:column;gap:7px}
.match-item{
  padding:10px 14px;border-radius:9px;background:var(--lb);border:2px solid var(--lb-border);
  font-size:14px;color:var(--text);cursor:pointer;transition:all .18s;
  font-family:var(--fm);min-height:44px;display:flex;align-items:center;
}
.match-item:hover{border-color:var(--blue)}
.match-item.selected{border-color:var(--gold);background:var(--golddim);color:var(--gold)}
.match-item.matched{border-color:var(--green);background:var(--greendim);color:var(--green);cursor:default}
.match-item.wrong{border-color:var(--red);animation:shake .4s var(--ease)}
.match-result{padding:14px;background:var(--lb);border-radius:var(--r);text-align:center;margin-bottom:14px}
.match-score{font-family:var(--fd);font-size:28px;font-weight:600;color:var(--gold)}
.match-score-sub{font-size:13px;color:var(--text2);margin-top:4px}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* Right-click vocabulary context menu */
.word-ctx-menu{
  position:fixed;z-index:9999;
  background:var(--surface);border:1px solid var(--border2);
  border-radius:var(--r);box-shadow:0 4px 20px rgba(0,0,0,.12);
  padding:6px 4px;min-width:210px;
  animation:fadeIn .14s var(--ease);
}
.word-ctx-word{
  font-family:var(--fm);font-size:11px;font-weight:600;color:var(--text3);
  padding:5px 12px 4px;border-bottom:1px solid var(--border);
  margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.word-ctx-item{
  display:flex;align-items:center;gap:9px;
  padding:8px 12px;border-radius:7px;
  font-size:12.5px;color:var(--text2);cursor:pointer;transition:all .12s;
}
.word-ctx-item:hover{background:var(--golddim);color:var(--gold)}
.ctx-icon{font-size:14px;flex-shrink:0}

/* ── Tablet (iPad landscape/portrait) ─────────────────────────────── */
@media(max-width:1024px){
  .nc-lesson-grid{grid-template-columns:1fr}
  .nc-summary-row{grid-template-columns:1fr}
  .nc-sum-block.de{border-right:none;border-bottom:1px solid var(--lb-border)}
}
/* ── Collapse sidebar to icons ─────────────────────────────────────── */
@media(max-width:900px){
  .sidebar{width:52px;min-width:52px;padding:8px 5px}
  .mcard-text,.mcard-desc,.sidebar-label,.sidebar-stats{display:none}
  .mcard{justify-content:center;padding:10px;border-radius:10px}
  .level-nav{gap:1px}
  .lvl{padding:4px 9px;font-size:10px}
}
/* ── Mobile full ─────────────────────────────────────────────────────
   Hide sidebar, full-width panels, larger tap targets
   ─────────────────────────────────────────────────────────────────── */
@media(max-width:640px){
  /* Sidebar becomes a bottom tab bar */
  .sidebar{
    display:flex;flex-direction:row;
    position:fixed;bottom:0;left:0;right:0;
    width:100%;min-width:100%;height:56px;
    z-index:100;border-top:1px solid var(--border);border-right:none;
    background:var(--bg2);padding:4px 2px;gap:0;overflow-x:auto;
    box-shadow:0 -2px 12px rgba(0,0,0,.3);
  }
  .sidebar-label,.sidebar-stats{display:none}
  .mcard{
    flex:1;flex-direction:column;justify-content:center;align-items:center;
    padding:4px 2px;border-radius:8px;gap:2px;min-width:50px;
  }
  .mcard-icon{font-size:19px}
  .mcard-name{font-size:9px!important;display:block!important;color:var(--text3);font-family:var(--fu)}
  .mcard-desc{display:none!important}
  .mcard-text{display:flex!important;flex-direction:column;align-items:center}
  .mcard-status{display:none}
  /* Main col needs bottom padding for tab bar */
  .app{padding-bottom:56px}
  .main-col{height:calc(100dvh - 56px - 52px)}
  /* Topbar compact */
  .topbar{gap:6px;padding:8px 12px}
  .logo-sub{display:none}
  .logo-name{font-size:15px}
  .level-nav{gap:1px}
  .lvl{padding:3px 8px;font-size:10px}
  /* Drawer full width */
  .drawer{width:100%;right:-100%}
  /* Cards */
  .nc-card-inner{margin:8px;border-radius:12px}
  .nc-article{padding:0}
  .nc-chat{padding:8px 12px 10px;gap:5px}
  .nc-input{font-size:14px;padding:9px 11px}
  .nc-send-btn{padding:9px 13px}
  .nc-headline{font-size:17px}
  /* Vocab panel */
  .vbank-actions{flex-wrap:wrap;gap:4px}
  .vbank-dict-link{font-size:9.5px;padding:2px 6px}
  /* Exam panel */
  .exam-tabs{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .exam-tab{white-space:nowrap;padding:10px 14px;font-size:12px}
  .ex-card{padding:14px}
  .ex-options{gap:6px}
  .ex-option{padding:10px 12px;font-size:13px}
  .ex-textarea{min-height:100px;font-size:14px}
  /* Nav */
  .slider-nav-bar{padding:7px 12px;gap:6px}
  .nav-counter{font-size:10px;min-width:36px}
  /* Home grid */
  .home-grid{grid-template-columns:1fr 1fr}
  .home-title{font-size:26px}
  /* Vocab bank cards */
  .nc-lesson-grid{grid-template-columns:1fr}
  .nc-summary-row{grid-template-columns:1fr}
  .nc-sum-block.de{border-right:none;border-bottom:1px solid var(--lb-border)}
  /* Touch-friendly buttons */
  .btn-submit,.btn-next,.btn-generate{min-height:42px;font-size:14px}
}
/* ── Very small phones ────────────────────────────────────────────── */
@media(max-width:360px){
  .lvl{padding:3px 6px;font-size:9.5px}
  .mcard{min-width:42px}
  .nc-headline{font-size:15px}
}
/* ── Safe area for iPhone notch/home bar ──────────────────────────── */
@supports(padding-bottom:env(safe-area-inset-bottom)){
  .sidebar{padding-bottom:calc(4px + env(safe-area-inset-bottom))}
  @media(max-width:640px){
    .app{padding-bottom:calc(56px + env(safe-area-inset-bottom))}
  }
}
</style>
</head>
<body>

<header class="topbar">
  <div class="logo">
    <div class="logo-badge">D</div>
    <div>
      <span class="logo-name">DeutschBot</span>
      <span class="logo-sub">AI Language Platform</span>
    </div>
  </div>
  <div class="topbar-sep"></div>
  <nav class="level-nav" id="levelNav">
    <button class="lvl on" data-lv="A1" onclick="setLevel('A1')">A1</button>
    <button class="lvl" data-lv="A2" onclick="setLevel('A2')">A2</button>
    <button class="lvl" data-lv="B1" onclick="setLevel('B1')">B1</button>
    <button class="lvl" data-lv="B2" onclick="setLevel('B2')">B2</button>
    <button class="lvl" data-lv="C1" onclick="setLevel('C1')">C1</button>
    <button class="lvl" data-lv="C2" onclick="setLevel('C2')">C2</button>
  </nav>
  <div class="topbar-right">
    <div class="key-dot-wrap" id="keyBtn" onclick="openDrawer('keys')" title="API Settings — click to configure">
      <div class="key-dot" id="apiDot"></div>
    </div>
    <div class="icon-btn" onclick="openDrawer()" title="Settings">⚙</div>
  </div>
</header>

<div class="prog-strip"><div class="prog-fill" id="prog" style="width:5%"></div></div>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-label">Modes</div>
    <div id="sidebarModes"></div>
    <div class="sidebar-stats">
      <div class="sstat"><span class="sstat-label">Messages</span><span class="sstat-val" id="stMsgs">0</span></div>
      <div class="sstat"><span class="sstat-label">Level</span><span class="sstat-val" id="stLv">A1</span></div>
      <div class="sstat"><span class="sstat-label">Streak</span><span class="sstat-val" id="stStr">0 🔥</span></div>
    </div>
  </aside>
  <main class="main-col" id="mainCol"></main>
</div>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-top">
    <div class="drawer-title">⚙ Settings</div>
    <div class="drawer-close" onclick="closeDrawer()">✕</div>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<div class="toast" id="toast"></div>
<div class="word-ctx-menu" id="wordCtxMenu" style="display:none">
  <div class="word-ctx-word" id="wordCtxLabel">…</div>
  <div class="word-ctx-meaning" id="wordCtxMeaning" style="font-size:11px;color:var(--text2);padding:3px 12px 5px;min-height:14px;border-bottom:1px solid var(--border);margin-bottom:3px"></div>
  <div class="word-ctx-item" onclick="ctxSaveWord()"><span class="ctx-icon">⭐</span> Save to My Vocabulary</div>
  <div class="word-ctx-item" onclick="ctxLookupWord()"><span class="ctx-icon">🔍</span> Look up on dict.cc</div>
  <div class="word-ctx-item" onclick="closeCtxMenu()"><span class="ctx-icon">✕</span> Close</div>
</div>

<script>
'use strict';

/* ── NETLIFY / ENVIRONMENT API KEY SUPPORT ─────────────────────────────────
 * For Netlify drag-drop deploy (no build step):
 *   Set your Gemini key in the app's ⚙ Settings → API Keys (stored in localStorage).
 *
 * For Netlify with build step (netlify.toml):
 *   Set DEUTSCHBOT_GEMINI_KEY in Netlify dashboard (Site settings → Environment variables).
 *   In netlify.toml add: [build.environment] DEUTSCHBOT_GEMINI_KEY = ""
 *   Then this line picks it up automatically:
 *
 * The app reads: NETLIFY_GEMINI_KEY (window global) → localStorage → empty
 * ─────────────────────────────────────────────────────────────────────────── */
// Netlify build-time injection: replace the placeholder below with the actual key
// via a build script, or leave as empty string and set key in ⚙ Settings
const NETLIFY_GEMINI_KEY = (typeof __NETLIFY_GEMINI_KEY__ !== 'undefined')
  ? __NETLIFY_GEMINI_KEY__
  : '';  // populated by Netlify build if configured

/* ════════════════════════════════════════════════════════
   [CONFIG] — Edit here to customise feeds, providers, modes
   ════════════════════════════════════════════════════════ */

// ── API PROVIDERS ──────────────────────────────────────────────────────
// Each provider: label, keyHint, keyUrl, model, buildUrl, buildBody,
// parseReply, parseError, extraHeaders (optional).
// Set MODES[x].apiProvider = 'key_name' to assign a provider to a mode.
const API_PROVIDERS = {

  gemini: {

// ── CORS PROXY CHAIN ── 3 proxies tried in order ───────────────────────
// mode:'param' = returns JSON {contents:'...'} (allorigins)
// mode:'raw'   = returns raw XML text directly
// ── RSS-TO-JSON SERVICES ───────────────────────────────────────────────
// These convert RSS feeds to JSON server-side and return proper CORS headers.
// Much more reliable than CORS proxies in browser / iframe environments.
//
// Primary:  rss2json.com  — free, 10,000 req/day, returns clean JSON
// Fallback: feed2json.org — open source, returns JSON, CORS enabled
//
// Format: each entry in RSS_CONVERTERS must implement:
//   buildUrl(feedUrl) → string
//   parse(json, feed) → array of item objects
const RSS_CONVERTERS = [
  {
    name: 'rss2json',
    buildUrl: (feedUrl) =>
      `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}&api_key=&count=10`,
    parse: (json, feed) => {
      if (json.status !== 'ok' || !json.items?.length) return [];
      return json.items.slice(0, FEED_MAX_PER).map(item => {
        const desc = (item.description || item.content || '')
          .replace(/<[^>]*>/g, ' ').replace(/\s{2,}/g, ' ').trim().substring(0, 800);
        return {
          title:   cleanEntities(item.title || ''),
          desc,
          link:    item.link || '#',
          pubDate: item.pubDate || '',
          source:  feed.name,
          lang:    feed.lang,
          topic:   feed.topic,
          feedId:  feed.id,
        };
      }).filter(i => i.title.length > 8);
    },
  },
  {
    name: 'feed2json',
    buildUrl: (feedUrl) =>
      `https://feed2json.org/convert?url=${encodeURIComponent(feedUrl)}`,
    parse: (json, feed) => {
      const items = json.items || json.entries || [];
      if (!items.length) return [];
      return items.slice(0, FEED_MAX_PER).map(item => {
        const desc = (item.content_html || item.content_text || item.summary || '')
          .replace(/<[^>]*>/g, ' ').replace(/\s{2,}/g, ' ').trim().substring(0, 800);
        return {
          title:   cleanEntities(item.title || ''),
          desc,
          link:    item.url || item.link || '#',
          pubDate: item.date_published || item.date_modified || '',
          source:  feed.name,
          lang:    feed.lang,
          topic:   feed.topic,
          feedId:  feed.id,
        };
      }).filter(i => i.title.length > 8);
    },
  },
];

/* ════════════════════════════════════════════════════════
   [CACHE] — Background prefetch engine
   ════════════════════════════════════════════════════════

   HOW IT WORKS:
   1. On page load, init() calls bgPrefetch() after 800ms
   2. bgPrefetch() fetches RSS feeds for 'news' and 'tech' silently
   3. After feeds arrive, it generates AI lessons for the first 5 cards
      with a 900ms stagger between each to avoid API rate limits
   4. Results stored in BG_CACHE keyed by mode+level
   5. When user clicks News/Tech tab, renderNewsPanel() checks cache first
      — if data exists it renders instantly; if not it shows loader
   6. Lessons already generated are marked _lessonDone = true so
      generateCardLesson() never re-generates them (saves tokens)
   ════════════════════════════════════════════════════════ */
const BG_CACHE = {
  // BG_CACHE['news_B1'] = { items: [...], ts: Date.now() }
  // BG_CACHE['tech_B1'] = { items: [...], ts: Date.now() }
};
const CACHE_TTL = 12 * 60 * 60 * 1000; // 12 hours — don't re-fetch same day

function cacheKey(mode, lv) { return `${mode}_${lv}`; }
function cacheGet(mode, lv) {
  const c = BG_CACHE[cacheKey(mode,lv)];
  if (!c) return null;
  if (Date.now() - c.ts > CACHE_TTL) { delete BG_CACHE[cacheKey(mode,lv)]; return null; }
  return c.items;
}
function cacheSet(mode, lv, items) {
  BG_CACHE[cacheKey(mode,lv)] = { items, ts: Date.now() };
}

let bgRunning = false;

/**
 * Background prefetch — runs once after page load.
 * Fetches both news + tech feeds, then generates first 5 lessons each.
 * Does NOT block page load or show any UI while running.
 */
async function bgPrefetch() {
  if (bgRunning) return;
  bgRunning = true;
  const lv = S.lv;
  const pKey = MODES.news.apiProvider;
  const key  = S.keys[pKey];

  for (const mode of ['news', 'tech']) {
    if (cacheGet(mode, lv)) { setSidebarStatus(mode, 'ready'); continue; }

    setSidebarStatus(mode, 'loading');
    try {
      const items = await loadFeeds(mode);
      if (!items.length) { setSidebarStatus(mode, ''); continue; }
      cacheSet(mode, lv, items);
      setSidebarStatus(mode, 'ready');
      // NOTE: Do NOT generate AI lessons here — the card DOM elements
      // (de-${idx}, lesson-${idx}) don't exist until the user opens the
      // tab and renderNewsCards() runs. Lessons are generated on-demand
      // in renderNewsCards() and newsNav() instead.
    } catch(e) {
      setSidebarStatus(mode, '');
      console.warn('bgPrefetch failed for', mode, e.message);
    }
  }
  bgRunning = false;
}

function setSidebarStatus(mode, state) {
  const dot = document.getElementById(`status-${mode}`);
  if (!dot) return;
  dot.className = 'mcard-status' + (state ? ' ' + state : '');
}

/* ════════════════════════════════════════════════════════
   [API] — AI call gateway
   All AI calls go through callAI(). Provider selected
   automatically from MODES[mode].apiProvider.
   To add a new provider: add to API_PROVIDERS in [CONFIG].
   ════════════════════════════════════════════════════════ */
const sleep = ms=>new Promise(r=>setTimeout(r,ms));

async function callAI(userText, isOpener, providerKey=null, retryCount=0, maxTokens=700) {
  const pKey     = providerKey || MODES[S.mode]?.apiProvider || 'gemini';
  const provider = API_PROVIDERS[pKey];
  const key      = S.keys[pKey];

  if (!provider) { addMsg('bot',`⚠️ Unknown provider: ${pKey}`); return; }
  if (!key) {
    addMsg('bot',
      `🔑 <strong>${provider.label} key needed.</strong><br><br>`+
      `Go to <strong>⚙ Settings → API Keys</strong> and paste your key.<br>`+
      `Get it free at: <a href="${provider.keyUrl}" target="_blank" style="color:var(--gold)">${provider.keyUrl.replace('https://','')}</a>`
    );
    return;
  }

  S.busy = true;
  const btn = document.getElementById('sendBtn');
  if (btn) btn.disabled = true;

  // Build contents — inject system turn only once per session
  let contents;
  if (isOpener || S.hist.length === 0) {
    const sys  = {role:'user',  parts:[{text:buildSystemTurn()}]};
    const ack  = {role:'model', parts:[{text:'Verstanden.'}]};
    const user = {role:'user',  parts:[{text:userText}]};
    S.hist = [sys, ack, user];
    contents = S.hist;
  } else {
    if (retryCount === 0) S.hist.push({role:'user',parts:[{text:userText}]});
    // Keep system turns (0-1) + last 6 turns only — saves tokens on every call
    contents = [...S.hist.slice(0,2), ...S.hist.slice(-6)];
  }

  const typing = retryCount===0 ? showTyping() : (document.querySelector('.typing')||{remove:()=>{}});
  const url    = provider.buildUrl(key, provider.model);
  const body   = provider.buildBody(contents, maxTokens);
  const hdrs   = {'Content-Type':'application/json', ...(provider.extraHeaders?.(key)||{})};

  try {
    const res = await fetch(url,{method:'POST',headers:hdrs,body:JSON.stringify(body)});

    // Auto-retry on 429 with countdown
    if (res.status === 429) {
      let wait = 15;
      try { const ed=await res.json(); const m=(ed?.error?.message||'').match(/(\d+\.?\d*)s/); if(m)wait=Math.ceil(parseFloat(m[1]))+3; } catch(_){}
      wait = Math.min(wait,40);
      if (retryCount < 2) {
        for(let i=wait;i>0;i--){showToast(`⏳ Rate limit — retrying in ${i}s…`,1100);await sleep(1000);}
        return callAI(userText,isOpener,providerKey,retryCount+1,maxTokens);
      } else {
        typing.remove();
        addMsg('bot','⏱️ <strong>Rate limit.</strong> Wait 60 seconds then try again.');
        if(!isOpener&&retryCount===0)S.hist.pop();
        S.busy=false; if(btn)btn.disabled=false; return;
      }
    }

    const data = await res.json();
    typing.remove();
    const err = provider.parseError(data);
    if (err) {
      const m = err.code===401||err.code===403?'Invalid API key — check Settings.':
                err.code===400?'Bad request — start a fresh session.':
                err.code===429?'Rate limit — wait 60 seconds.':err.msg;
      addMsg('bot',`⚠️ <strong>Error ${err.code}:</strong> ${m}`);
      if(!isOpener&&retryCount===0)S.hist.pop();
    } else {
      const reply = provider.parseReply(data)||'(empty — try again)';
      S.hist.push({role:'model',parts:[{text:reply}]});
      addMsg('bot',reply);
      S.msgs++; S.streak++;
      sp('db_msgs',S.msgs); sp('db_streak',S.streak); updateStats();
    }
  } catch(e) {
    typing.remove();
    addMsg('bot',`⚠️ <strong>Connection error:</strong> ${e.message}`);
    if(!isOpener&&retryCount===0)S.hist.pop();
  }
  S.busy=false; if(btn)btn.disabled=false;
}

/* ════════════════════════════════════════════════════════
   [FEED] — RSS loader with 3-proxy fallback chain
   ════════════════════════════════════════════════════════ */
// Clean HTML entities from text
function cleanEntities(s) {
  return s.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
          .replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&nbsp;/g,' ');
}

/**
 * Fetch one feed using RSS-to-JSON converters.
 * Tries each converter in order; returns items from first success.
 * Uses Promise.race for timeout — no AbortController (breaks in iframes).
 */
async function fetchOneFeed(feed) {
  for (const converter of RSS_CONVERTERS) {
    try {
      const url = converter.buildUrl(feed.url);
      const fetchPromise = fetch(url, { mode: 'cors' })
        .then(res => {
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return res.json();
        })
        .then(json => converter.parse(json, feed));

      const timeoutPromise = new Promise((_, reject) =>
        setTimeout(() => reject(new Error('timeout')), FEED_TIMEOUT)
      );

      const items = await Promise.race([fetchPromise, timeoutPromise]);
      if (items && items.length > 0) return items; // success
    } catch(e) {
      console.warn(`${converter.name} failed for ${feed.name}:`, e.message);
      // Try next converter
    }
  }
  console.warn(`All converters failed for: ${feed.name}`);
  return [];
}

async function loadFeeds(mode) {
  const list = mode==='tech' ? TECH_FEEDS : NEWS_FEEDS;
  const act  = mode==='tech' ? S.activeFeedsTech : S.activeFeedsNews;
  const feeds = list.filter(f=>act.includes(f.id));
  if (!feeds.length) return [];
  const results = await Promise.allSettled(feeds.map(f=>fetchOneFeed(f)));
  const all = [];
  results.forEach(r=>{ if(r.status==='fulfilled') all.push(...r.value); });
  // Shuffle to interleave sources
  for(let i=all.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[all[i],all[j]]=[all[j],all[i]];}
  // Sort by date — newest first
  all.sort((a,b)=>{
    const da=a.pubDate?new Date(a.pubDate):new Date(0);
    const db=b.pubDate?new Date(b.pubDate):new Date(0);
    return db-da;
  });
  return all.slice(0,FEED_TOTAL);
}

function timeAgo(s) {
  if (!s) return '';
  try {
    const d=new Date(s), diff=Date.now()-d.getTime(), h=Math.floor(diff/3600000);
    if (h<1) return 'Just now';
    if (h<24) return `${h}h ago`;
    if (h<48) return 'Yesterday';
    return `${Math.floor(h/24)}d ago`;
  } catch(_){return '';}
}

async function fetchAndShowNews(mode) {
  const refreshBtn = document.getElementById('refreshBtn');
  if (refreshBtn) refreshBtn.classList.add('busy');

  const items = await loadFeeds(mode);
  if (refreshBtn) refreshBtn.classList.remove('busy');

  S.newsItems = items;
  S.newsIdx   = 0;
  S.newsChats = {};

  if (!items.length) {
    const body = document.getElementById('newsBody');
    if (body) body.innerHTML = `<div class="news-state">
      <div style="font-size:32px;margin-bottom:8px">📡</div>
      <p>Could not load headlines. Check connection or toggle different sources above.</p>
      <button class="btn-gold" style="margin-top:12px" onclick="fetchAndShowNews('${mode}')">Try Again</button>
    </div>`;
    const nav = document.getElementById('sliderNav');
    if (nav) nav.style.display='none';
    return;
  }

  cacheSet(mode, S.lv, items);
  setSidebarStatus(mode, 'ready');
  renderNewsCards(items, true); // true = generate lessons (fresh load)
}

function renderNewsCards(items, generateLessons) {
  const body = document.getElementById('newsBody');
  const nav  = document.getElementById('sliderNav');
  if (!body) return;

  // Build card HTML — if item already has saved lesson/summary HTML, inject it
  body.innerHTML = items.map((item,i) => buildCardHTML(item, i)).join('');
  if (nav) nav.style.display = 'flex';
  buildNavDots(items.length);

  // Wire right-click context menu on all article areas
  attachAllCtxMenus();

  // Wire touch/swipe navigation
  attachSwipe();

  // Restore previously generated lesson content into DOM
  items.forEach((item, i) => {
    if (item._headlineEn) {
      const el = document.getElementById('en-headline-'+i);
      if (el) { el.textContent = '🇬🇧 ' + item._headlineEn; el.style.display = 'block'; }
    }
    // Restore side-by-side summary (saved as innerHTML of the whole summary row)
    if (item._summaryHTML) {
      const el = document.getElementById('de-'+i);
      if (el) el.innerHTML = item._summaryHTML;
    }
    if (item._lessonHTML) {
      const el = document.getElementById('lesson-'+i);
      if (el) el.innerHTML = item._lessonHTML;
    }
  });

  showCard(S.newsIdx || 0);

  if (!generateLessons) return; // returning to tab — don't re-generate

  const mode = S.newsMode;
  const pKey = MODES[mode]?.apiProvider || 'gemini';
  if (!S.keys[pKey]) {
    showLessonError(0, '🔑 Add an API key in ⚙ Settings to generate German lessons.');
    return;
  }

  // First card immediately, next 4 staggered
  generateCardLesson(items, 0, mode, false);
  for (let i = 1; i < Math.min(5, items.length); i++) {
    setTimeout(() => generateCardLesson(items, i, mode, false), i * 1400);
  }
}
